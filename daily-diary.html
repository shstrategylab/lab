<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 하루 돌아보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brown: #6B4F35;
    --brown-light: #9A7050;
    --brown-pale: #FDF8F2;
    --brown-bg: #F5EDE0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Serif KR', Georgia, serif;
    background: linear-gradient(170deg, #FDF8F2 0%, #F5EDE0 100%);
    min-height: 100vh;
    padding-bottom: 100px;
  }
  ::-webkit-scrollbar { display: none; }

  /* Header */
  #header {
    background: linear-gradient(135deg, #6B4F35 0%, #9A7050 100%);
    padding: 32px 20px 24px;
    text-align: center;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 4px 20px rgba(107,79,53,0.25);
  }
  #header .date-label { color: rgba(255,255,255,0.65); font-size: 12px; letter-spacing: 3px; margin-bottom: 6px; }
  #header h1 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  #header .subtitle { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 5px; font-style: italic; }
  .progress-wrap { margin-top: 16px; display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; background: rgba(255,255,255,0.2); border-radius: 20px; height: 7px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #FFD580, #FFF3C0); border-radius: 20px; width: 0%; transition: width 0.4s ease; }
  .progress-text { color: rgba(255,255,255,0.9); font-size: 12px; white-space: nowrap; }

  /* Category divider */
  .cat-divider {
    display: flex; align-items: center; gap: 10px;
    padding: 24px 20px 10px;
  }
  .cat-divider .cat-emoji { font-size: 18px; }
  .cat-divider .cat-name { font-weight: 700; font-size: 14px; letter-spacing: 1px; }
  .cat-divider .cat-line { flex: 1; height: 1px; }
  .cat-divider .cat-count { font-size: 12px; }

  /* Item card */
  .item-card {
    margin: 0 16px 10px;
    border-radius: 16px;
    background: #fff;
    border: 1.5px solid #EDE8E0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .item-card.is-next { border-width: 2px; box-shadow: 0 4px 20px rgba(107,79,53,0.18); }
  .item-card.answered-yes { background: var(--item-bg); border-color: var(--item-border); }
  .item-card.answered-no { background: #F8F8F8; border-color: #EDE8E0; }

  .item-body { padding: 16px 16px 12px; }
  .item-q { font-size: 15px; color: #3A3028; line-height: 1.6; }
  .item-card.answered-no .item-q { color: #BBB; }
  .item-card.is-next .item-q { font-weight: 600; }
  .item-hint { font-size: 11px; color: #C0B8AF; margin-top: 5px; font-style: italic; }
  .item-card.answered-yes .item-hint { color: var(--item-color); }

  .item-btns { display: flex; border-top: 1px solid #F0EBE3; }
  .btn-yes, .btn-no {
    flex: 1; padding: 13px 0;
    border: none; background: transparent;
    font-size: 14px; font-family: 'Noto Serif KR', Georgia, serif;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-yes { border-right: 1px solid #F0EBE3; color: #888; border-radius: 0 0 0 16px; }
  .btn-no { color: #AAA; border-radius: 0 0 16px 0; }
  .item-card.answered-yes .btn-yes { color: #fff; font-weight: 700; }
  .item-card.answered-no .btn-no { background: #E8E2DA; color: #888; font-weight: 600; }

  /* Result card */
  #result-card {
    margin: 8px 16px 0;
    background: linear-gradient(135deg, #6B4F35, #9A7050);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(107,79,53,0.3);
    display: none;
  }
  #result-card .res-emoji { font-size: 40px; }
  #result-card .res-pct { color: #FFE9B8; font-size: 28px; font-weight: 700; margin-top: 8px; }
  #result-card .res-msg { color: rgba(255,255,255,0.9); font-size: 15px; margin-top: 6px; line-height: 1.6; }
  #result-card .res-sub { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px; }

  /* Share button */
  #share-btn-wrap { padding: 16px 16px 0; }
  #share-btn {
    width: 100%; padding: 17px;
    background: linear-gradient(135deg, #B09070, #C8A882);
    color: #fff; border: none; border-radius: 16px;
    font-size: 16px; font-weight: 700;
    font-family: 'Noto Serif KR', Georgia, serif;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(107,79,53,0.35);
    letter-spacing: 0.5px;
    transition: background 0.3s;
  }
  #share-btn.all-done { background: linear-gradient(135deg, #6B4F35, #9A7050); }

  /* Modal overlay */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 100;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #FDF8F2; border-radius: 24px 24px 0 0;
    padding: 28px 20px 44px; width: 100%;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-title { text-align: center; margin-bottom: 24px; }
  .modal-title h2 { font-size: 20px; font-weight: 700; color: #4A3020; }
  .modal-title p { font-size: 13px; color: #AAA; margin-top: 6px; }

  .share-option {
    background: #fff; border: 1.5px solid #D4C4B0;
    border-radius: 16px; padding: 20px;
    margin-bottom: 12px; cursor: pointer;
    display: flex; gap: 14px; align-items: flex-start;
    transition: border-color 0.2s;
  }
  .share-option:active { border-color: var(--brown); }
  .share-option .opt-icon { font-size: 32px; flex-shrink: 0; }
  .share-option h3 { font-weight: 700; font-size: 16px; color: #4A3020; margin-bottom: 4px; }
  .share-option p { font-size: 13px; color: #888; line-height: 1.6; }

  .share-preview-card {
    border-radius: 16px; padding: 20px;
    margin-bottom: 16px; color: #fff;
  }
  .share-preview-card.result-type { background: linear-gradient(135deg, #6B4F35, #9A7050); }
  .share-preview-card.invite-type { background: linear-gradient(135deg, #3A6050, #5A8070); }
  .preview-big-emoji { font-size: 28px; margin-bottom: 4px; }
  .preview-pct { font-size: 22px; font-weight: 700; }
  .preview-sub { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .preview-tags { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
  .preview-tag { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 12px; font-size: 12px; }
  .preview-quote { margin-top: 14px; font-size: 13px; opacity: 0.9; font-style: italic; line-height: 1.6; }

  .text-preview {
    background: #fff; border-radius: 12px; padding: 14px 16px;
    font-size: 12px; color: #666; line-height: 1.8;
    white-space: pre-wrap; border: 1px solid #EDE8E0;
    margin-bottom: 16px; max-height: 180px; overflow-y: auto;
  }

  .btn-copy {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #6B4F35, #9A7050);
    color: #fff; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Serif KR', Georgia, serif;
    cursor: pointer; margin-bottom: 10px;
    box-shadow: 0 4px 14px rgba(107,79,53,0.3);
  }
  .btn-close {
    width: 100%; padding: 14px;
    background: transparent; color: #AAA;
    border: 1px solid #DDD; border-radius: 14px;
    font-size: 14px;
    font-family: 'Noto Serif KR', Georgia, serif;
    cursor: pointer;
  }
  .btn-back {
    background: none; border: none; color: #AAA;
    font-size: 14px; cursor: pointer;
    font-family: 'Noto Serif KR', Georgia, serif;
    margin-bottom: 12px; padding: 0 0 4px;
  }
  .share-detail-title { font-size: 16px; font-weight: 700; color: #4A3020; margin-bottom: 16px; }

  /* Toast */
  #toast {
    display: none; position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%);
    background: #3A2A1A; color: #fff;
    padding: 13px 22px; border-radius: 24px;
    font-size: 13px; z-index: 200; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="date-label" id="date-label"></div>
  <h1>오늘 하루 돌아보기</h1>
  <div class="subtitle">빈손으로 왔다 빈손으로 간다. 그게 인생이다.</div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="progress-text" id="prog-text">0 / 35</div>
  </div>
</div>

<!-- Items injected by JS -->
<div id="items-wrap"></div>

<!-- Result card -->
<div id="result-card">
  <div class="res-emoji" id="res-emoji"></div>
  <div class="res-pct" id="res-pct"></div>
  <div class="res-msg" id="res-msg"></div>
  <div class="res-sub" id="res-sub"></div>
</div>

<!-- Share button -->
<div id="share-btn-wrap">
  <button id="share-btn" onclick="openShare()">📤 지금까지 결과 공유하기</button>
</div>

<!-- Share Modal -->
<div class="modal-overlay" id="share-modal" onclick="closeShare()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <!-- Step 1: choose type -->
    <div id="share-step1">
      <div class="modal-title">
        <h2>공유하기</h2>
        <p>어떤 내용을 공유할까요?</p>
      </div>
      <div class="share-option" onclick="showShareDetail('result')">
        <div class="opt-icon">📊</div>
        <div>
          <h3>내 진단 결과 공유</h3>
          <p>오늘 내가 실천한 것들을 공유해요.<br>친구들이 보고 "나도 해봐야겠다" 싶게 만들어요.</p>
        </div>
      </div>
      <div class="share-option" onclick="showShareDetail('invite')">
        <div class="opt-icon">🌿</div>
        <div>
          <h3>앱 자체 공유 (초대)</h3>
          <p>이 자가진단 앱을 친구에게 소개해요.<br>같이 하루를 돌아보자고 권해봐요.</p>
        </div>
      </div>
      <button class="btn-close" onclick="closeShare()">닫기</button>
    </div>
    <!-- Step 2: detail -->
    <div id="share-step2" style="display:none">
      <button class="btn-back" onclick="backToStep1()">← 뒤로</button>
      <div class="share-detail-title" id="share-detail-title"></div>
      <div class="share-preview-card" id="share-preview-card"></div>
      <div class="text-preview" id="share-text-preview"></div>
      <button class="btn-copy" onclick="copyShareText()">📋 텍스트 복사하기</button>
      <button class="btn-close" onclick="closeShare()">닫기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

  { id:"m5",  cat:"아침루틴", emoji:"☀️", q:"아침에 핸드폰보다 몸을 먼저 깨우는 루틴이 있었나요?",        hint:"하루의 시작이 하루를 만든다",                  yes:"루틴 지켰다",       no:"핸드폰 먼저 봤다" },
  // 마인드셋
  { id:"ms1", cat:"마인드셋", emoji:"💡", q:"착하다는 말에 안주하지 않고 실력을 키우려 했나요?",          hint:"세상은 착한 사람보다 준비된 사람을 기다린다", yes:"실력 키웠다",       no:"안주했다" },
  { id:"ms2", cat:"마인드셋", emoji:"💡", q:"경제적 책임감을 갖고 행동했나요?",                          hint:"돈이 없으면 지킬 것도 없다",                  yes:"책임감 있게 행동했다", no:"흐지부지했다" },
  { id:"ms3", cat:"마인드셋", emoji:"💡", q:"남의 인생을 부러워하지 않고 내 삶에 집중했나요?",            hint:"비교는 감정을 갉아먹고 자기 삶을 흔든다",     yes:"내 삶에 집중했다",  no:"부러워했다" },
  { id:"ms4", cat:"마인드셋", emoji:"💡", q:"감정대로 행동하지 않고 한 번 참은 순간이 있었나요?",         hint:"때로 참는 게 이기는 것이다",                  yes:"참았다",            no:"감정대로 했다" },
  { id:"ms5", cat:"마인드셋", emoji:"💡", q:"하고 싶은 일보다 지금 할 수 있는 일을 먼저 했나요?",         hint:"현실을 딛고 나서야 꿈도 꿀 수 있다",          yes:"할 수 있는 일 먼저 했다", no:"미루었다" },
  { id:"ms6", cat:"마인드셋", emoji:"💡", q:"'왜 해야 하지?' 하는 순간에도 끝까지 해냈나요?",            hint:"그 일을 해낸 사람이 결국 성공한다",           yes:"끝까지 해냈다",     no:"포기했다" },
  { id:"ms7", cat:"마인드셋", emoji:"💡", q:"변하는 상황 속에서도 내 중심을 지켰나요?",                  hint:"사람도 변한다, 상황도 변한다",                yes:"중심을 지켰다",     no:"흔들렸다" },
];

const catConfig = {
  "인생철학":  { color:"#7A6248", bg:"#F5EFE6", border:"#C8B49850", light:"#FBF7F2" },
  "건강식습관":{ color:"#4A7A5A", bg:"#EAF5EC", border:"#7ABF8A50", light:"#F4FAF5" },
  "아침루틴":  { color:"#C08040", bg:"#FBF0E2", border:"#E0A06050", light:"#FEF8F0" },
  "마인드셋":  { color:"#3A6080", bg:"#E8F0F8", border:"#6090B850", light:"#F2F6FB" },
};

const cats = [...new Set(allItems.map(i => i.cat))];
let answers = {};
let currentShareType = null;

const todayKey = "answers_" + new Date().toISOString().split("T")[0];
try { const s = localStorage.getItem(todayKey); if(s) answers = JSON.parse(s); } catch{}

function saveAnswers() {
  try { localStorage.setItem(todayKey, JSON.stringify(answers)); } catch {}
}

function getDateLabel() {
  const d = new Date();
  const days = ["일","월","화","수","목","금","토"];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}요일)`;
}

function getResultEmoji(pct) {
  if(pct>=80) return "🌟"; if(pct>=60) return "😊"; if(pct>=40) return "🙂"; if(pct>=20) return "😐"; return "💪";
}
function getResultMsg(pct) {
  if(pct>=80) return "오늘 정말 잘 살았네요. 스스로를 칭찬해주세요!";
  if(pct>=60) return "꽤 잘 하고 있어요. 조금만 더 신경 써봐요.";
  if(pct>=40) return "절반은 실천했네요. 내일은 조금 더 해봐요.";
  if(pct>=20) return "오늘은 쉬어가는 날이었나요. 내일 다시 시작해요.";
  return "지금 이 앱을 쓴 것만으로도 이미 한 걸음 내딛은 거예요 💪";
}

document.getElementById("date-label").textContent = getDateLabel();

function render() {
  const wrap = document.getElementById("items-wrap");
  const answered = Object.keys(answers).length;
  const yesCount = Object.values(answers).filter(Boolean).length;
  const totalPct = Math.round((yesCount / allItems.length) * 100);
  const firstUnanswered = allItems.find(i => answers[i.id] === undefined);

  // Progress
  document.getElementById("prog-fill").style.width = ((answered / allItems.length)*100) + "%";
  document.getElementById("prog-text").textContent = answered + " / " + allItems.length;

  // Share button
  const btn = document.getElementById("share-btn");
  if(answered === allItems.length) {
    btn.textContent = "📤 오늘의 진단 공유하기";
    btn.classList.add("all-done");
  } else {
    btn.textContent = `📤 지금까지 결과 공유하기 (${answered}/${allItems.length})`;
    btn.classList.remove("all-done");
  }

  // Result card
  const rc = document.getElementById("result-card");
  if(answered === allItems.length) {
    rc.style.display = "block";
    document.getElementById("res-emoji").textContent = getResultEmoji(totalPct);
    document.getElementById("res-pct").textContent = totalPct + "%";
    document.getElementById("res-msg").textContent = getResultMsg(totalPct);
    document.getElementById("res-sub").textContent = allItems.length + "개 중 " + yesCount + "개 실천";
  } else {
    rc.style.display = "none";
  }

  // Build items HTML
  let html = "";
  cats.forEach(cat => {
    const cfg = catConfig[cat];
    const items = allItems.filter(i => i.cat === cat);
    const doneCount = items.filter(i => answers[i.id] === true).length;
    const answeredCount = items.filter(i => answers[i.id] !== undefined).length;

    html += `<div class="cat-divider">
      <span class="cat-emoji">${items[0].emoji}</span>
      <span class="cat-name" style="color:${cfg.color}">${cat}</span>
      <div class="cat-line" style="background:${cfg.color}30"></div>
      <span class="cat-count" style="color:${cfg.color}">${doneCount} / ${items.length}</span>
    </div>`;

    items.forEach(item => {
      const ans = answers[item.id];
      const isNext = firstUnanswered?.id === item.id;
      let cardClass = "item-card";
      if(isNext) cardClass += " is-next";
      if(ans === true) cardClass += " answered-yes";
      if(ans === false) cardClass += " answered-no";

      const cardStyle = `--item-color:${cfg.color}; --item-bg:${cfg.bg}; --item-border:${cfg.border};`
        + (isNext ? ` border-color:${cfg.color};` : "")
        + (ans === true ? ` background:${cfg.bg};` : "");

      const yesBtnStyle = ans === true ? `background:${cfg.color}; color:#fff; font-weight:700;` : "";
      const noBtnStyle = ans === false ? `background:#E8E2DA; color:#888; font-weight:600;` : "";

      html += `<div class="${cardClass}" style="${cardStyle}" id="card-${item.id}">
        <div class="item-body">
          <div class="item-q" style="${ans===false?'color:#BBB':''}">${item.q}</div>
          <div class="item-hint" style="color:${ans===true?cfg.color:'#C0B8AF'}">${item.hint}</div>
        </div>
        <div class="item-btns">
          <button class="btn-yes" style="${yesBtnStyle}" onclick="doAnswer('${item.id}', true)">
            ${ans===true ? "✅ " + item.yes : item.yes}
          </button>
          <button class="btn-no" style="${noBtnStyle}" onclick="doAnswer('${item.id}', false)">
            ${ans===false ? "😅 " + item.no : item.no}
          </button>
        </div>
      </div>`;
    });
  });

  wrap.innerHTML = html;
}

function doAnswer(id, val) {
  answers[id] = val;
  saveAnswers();
  render();
  // scroll to next unanswered
  setTimeout(() => {
    const next = allItems.find(i => answers[i.id] === undefined);
    if(next) {
      const el = document.getElementById("card-" + next.id);
      if(el) el.scrollIntoView({ behavior:"smooth", block:"center" });
    }
  }, 150);
}

function openShare() {
  document.getElementById("share-modal").classList.add("open");
  document.getElementById("share-step1").style.display = "block";
  document.getElementById("share-step2").style.display = "none";
}
function closeShare() {
  document.getElementById("share-modal").classList.remove("open");
  currentShareType = null;
}
function backToStep1() {
  document.getElementById("share-step1").style.display = "block";
  document.getElementById("share-step2").style.display = "none";
  currentShareType = null;
}

function showShareDetail(type) {
  currentShareType = type;
  document.getElementById("share-step1").style.display = "none";
  document.getElementById("share-step2").style.display = "block";

  const answered = Object.keys(answers).length;
  const yesCount = Object.values(answers).filter(Boolean).length;
  const totalPct = Math.round((yesCount / allItems.length) * 100);

  if(type === "result") {
    document.getElementById("share-detail-title").textContent = "📊 내 진단 결과";

    // Build preview card
    let tagsHtml = cats.map(cat => {
      const items = allItems.filter(i => i.cat === cat);
      const yes = items.filter(i => answers[i.id] === true).length;
      const done = items.filter(i => answers[i.id] !== undefined).length;
      return `<span class="preview-tag">${catConfig[cat] ? allItems.find(i=>i.cat===cat).emoji : ""} ${cat} ${yes}/${done}</span>`;
    }).join("");

    document.getElementById("share-preview-card").className = "share-preview-card result-type";
    document.getElementById("share-preview-card").innerHTML = `
      <div class="preview-big-emoji">${getResultEmoji(totalPct)}</div>
      <div class="preview-pct">${totalPct}% 실천</div>
      <div class="preview-sub">${allItems.length}개 항목 중 ${yesCount}개 · ${getDateLabel()}</div>
      <div class="preview-tags">${tagsHtml}</div>
      <div class="preview-quote">"${getResultMsg(totalPct)}"</div>
    `;
    document.getElementById("share-text-preview").textContent = generateResultText();
  } else {
    document.getElementById("share-detail-title").textContent = "🌿 앱 초대 메시지";
    document.getElementById("share-preview-card").className = "share-preview-card invite-type";
    document.getElementById("share-preview-card").innerHTML = `
      <div style="font-size:22px; font-weight:700; margin-bottom:8px">오늘 하루 얼마나 잘 살았나요? 🌿</div>
      <div style="font-size:13px; opacity:0.85; line-height:1.8">
        ${allItems.length}가지 질문에 솔직하게 답해보세요.<br>
        했다 / 못 했다, 딱 2가지만 골라요.<br>
        매일 저녁 2분이면 충분해요.
      </div>
      <div style="margin-top:12px; font-size:13px; opacity:0.7">나는 오늘 ${totalPct}% 실천했어요 ${getResultEmoji(totalPct)}</div>
    `;
    document.getElementById("share-text-preview").textContent = generateInviteText();
  }
}

function generateResultText() {
  const yesCount = Object.values(answers).filter(Boolean).length;
  const totalPct = Math.round((yesCount / allItems.length) * 100);
  const lines = [
    `${getResultEmoji(totalPct)} 오늘 하루 나의 자가진단 결과`,
    `📅 ${getDateLabel()}`,
    ``,
    `전체 ${allItems.length}개 항목 중 ${yesCount}개 실천 ✅`,
    `실천률 ${totalPct}%`,
    ``
  ];
  cats.forEach(cat => {
    const items = allItems.filter(i => i.cat === cat);
    const yes = items.filter(i => answers[i.id] === true).length;
    const done = items.filter(i => answers[i.id] !== undefined).length;
    lines.push(`${allItems.find(i=>i.cat===cat).emoji} ${cat}: ${yes}/${done} 실천`);
  });
  lines.push(``, `"${getResultMsg(totalPct)}"`, ``, `나도 오늘 하루를 돌아봤어요.`, `잠깐 멈추고 스스로를 체크해보는 건 어때요? 🌿`, `#오늘의실천 #하루돌아보기 #자기성찰 #성장일기`);
  return lines.join("\n");
}

function generateInviteText() {
  const yesCount = Object.values(answers).filter(Boolean).length;
  const totalPct = Math.round((yesCount / allItems.length) * 100);
  return [
    `🌿 오늘 하루 얼마나 잘 살았나요?`,``,
    `죽고 나면 소용없는 것들, 병 부르는 식습관,`,
    `94세 건강 전문가의 아침 루틴, 현실 인생 조언...`,``,
    `${allItems.length}가지 질문에 '했다/못 했다'로 솔직하게 답해보세요.`,
    `매일 저녁 2분이면 충분해요.`,``,
    `나는 오늘 ${totalPct}% 실천했어요 ${getResultEmoji(totalPct)}`,``,
    `#하루돌아보기 #자기성찰 #오늘도성장`
  ].join("\n");
}

function copyShareText() {
  const text = currentShareType === "result" ? generateResultText() : generateInviteText();
  navigator.clipboard?.writeText(text).then(() => {
    showToast("복사됐어요! SNS에 붙여넣기 해보세요 ✨");
  }).catch(() => showToast("텍스트를 직접 선택해서 복사해보세요"));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 3000);
}

render();
</script>
</body>
</html>
