<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자미두수 명반 · 紫微斗數</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97E;
    --gold-dark: #8B6914;
    --ink: #1A1208;
    --paper: #F5EDD8;
    --paper-dark: #EDE0C4;
    --paper-light: #FAF4E8;
    --red: #8B2020;
    --red-light: #C04040;
    --teal: #1A5E52;
    --teal-light: #2D8C7A;
    --muted: #6B5C3E;
    --border: rgba(201,168,76,0.3);
    --shadow: 0 4px 24px rgba(26,18,8,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0D0A05;
    min-height: 100vh;
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ─── 배경 별자리 패턴 ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 60%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 15%, rgba(201,168,76,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 45%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 80%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 25%, rgba(201,168,76,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 90%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 65% 70%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 85%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 8% 50%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 30% 35%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 10%, rgba(201,168,76,0.7) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  /* ─── 헤더 ─── */
  .header {
    text-align: center;
    padding: 3rem 0 2rem;
  }

  .header-symbol {
    font-size: 2.5rem;
    color: var(--gold);
    letter-spacing: 0.5em;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    color: var(--gold-light);
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-bottom: 0.4rem;
    text-shadow: 0 2px 12px rgba(201,168,76,0.3);
  }

  .header-sub {
    font-size: 0.85rem;
    color: rgba(201,168,76,0.6);
    letter-spacing: 0.3em;
    margin-bottom: 1rem;
  }

  .header-divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto;
  }

  /* ─── 입력 카드 ─── */
  .input-card {
    background: var(--paper-light);
    border: 1px solid var(--gold);
    border-radius: 2px;
    padding: 2rem;
    margin: 2rem 0;
    box-shadow: var(--shadow), inset 0 0 40px rgba(201,168,76,0.04);
    position: relative;
  }

  .input-card::before, .input-card::after {
    content: '◆';
    position: absolute;
    color: var(--gold);
    font-size: 0.7rem;
    opacity: 0.6;
  }

  .input-card::before { top: -0.4rem; left: -0.4rem; }
  .input-card::after  { bottom: -0.4rem; right: -0.4rem; }

  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    color: var(--gold-dark);
    letter-spacing: 0.2em;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-title::before, .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .form-group label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .form-group select,
  .form-group input {
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.6rem 0.8rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group select:focus,
  .form-group input:focus {
    border-color: var(--gold);
  }

  .gender-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .gender-toggle label {
    flex: 1;
    text-align: center;
    padding: 0.6rem;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0;
  }

  .gender-toggle input { display: none; }

  .gender-toggle input:checked + label {
    background: var(--gold);
    color: white;
    font-weight: 500;
  }

  .btn-calc {
    width: 100%;
    margin-top: 1.5rem;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
    background-size: 200% 100%;
    border: none;
    border-radius: 2px;
    color: white;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: background-position 0.3s, transform 0.1s;
  }

  .btn-calc:hover { background-position: 100% 0; }
  .btn-calc:active { transform: scale(0.99); }

  /* ─── 결과 영역 ─── */
  #result { display: none; }

  /* ─── 명반 기본 정보 ─── */
  .profile-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    background: var(--paper);
    border: 1px solid var(--gold);
    border-radius: 2px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .profile-item {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .profile-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .profile-value {
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    color: var(--ink);
    font-weight: 500;
  }

  .profile-divider {
    width: 1px;
    height: 2.5rem;
    background: var(--border);
  }

  /* ─── 명반 12궁 그리드 ─── */
  .palace-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, minmax(100px, auto));
    gap: 2px;
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--gold);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .palace {
    background: var(--paper-light);
    padding: 0.5rem 0.6rem;
    position: relative;
    min-height: 90px;
    transition: background 0.2s;
    cursor: pointer;
  }

  .palace:hover { background: #FFF8EA; }

  .palace.center-void {
    background: transparent;
    grid-column: 2 / 4;
    grid-row: 2 / 4;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
  }

  .center-text {
    font-family: 'Noto Serif KR', serif;
    text-align: center;
    color: rgba(201,168,76,0.5);
  }

  .center-text .big { font-size: 1.8rem; line-height: 1; }
  .center-text .sm  { font-size: 0.7rem; letter-spacing: 0.2em; margin-top: 0.3rem; }

  .palace-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.4rem;
  }

  .palace-name {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .palace-branch {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.75rem;
    color: var(--gold-dark);
  }

  .palace-stems {
    font-size: 0.6rem;
    color: var(--red);
    letter-spacing: 0.05em;
  }

  .palace-stars {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: 0.3rem;
  }

  .star-badge {
    font-size: 0.6rem;
    padding: 1px 4px;
    border-radius: 1px;
    white-space: nowrap;
  }

  .star-main  { background: rgba(139,32,32,0.1); color: var(--red); border: 0.5px solid rgba(139,32,32,0.3); }
  .star-lucky { background: rgba(26,94,82,0.1); color: var(--teal); border: 0.5px solid rgba(26,94,82,0.3); }
  .star-bad   { background: rgba(100,70,20,0.08); color: var(--muted); border: 0.5px solid var(--border); }

  .palace-daeyun {
    position: absolute;
    bottom: 0.3rem;
    right: 0.4rem;
    font-size: 0.55rem;
    color: var(--gold-dark);
    background: rgba(201,168,76,0.15);
    padding: 1px 4px;
    border-radius: 1px;
  }

  /* ─── 나이대별 운세 ─── */
  .destiny-section {
    margin-top: 0.5rem;
  }

  .age-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 1rem;
  }

  .age-tab {
    padding: 0.4rem 0.9rem;
    border: 1px solid var(--border);
    background: var(--paper-light);
    color: var(--muted);
    font-size: 0.8rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .age-tab:hover { border-color: var(--gold); color: var(--gold-dark); }
  .age-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
    font-weight: 500;
  }

  .destiny-card {
    background: var(--paper-light);
    border: 1px solid var(--gold);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  .destiny-card.active { display: block; }

  .destiny-header {
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .destiny-age-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.2rem;
    color: var(--gold-dark);
    font-weight: 700;
  }

  .destiny-palace-name {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .destiny-pillar {
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    color: var(--red);
    letter-spacing: 0.1em;
  }

  .destiny-body {
    padding: 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 600px) {
    .destiny-body { grid-template-columns: 1fr; }
  }

  .destiny-category {
    background: white;
    border: 0.5px solid var(--border);
    border-radius: 2px;
    padding: 1rem;
  }

  .category-icon-title {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  .category-icon {
    font-size: 1rem;
  }

  .category-title {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--gold-dark);
    letter-spacing: 0.1em;
  }

  .category-content {
    font-size: 0.82rem;
    color: var(--ink);
    line-height: 1.8;
  }

  .category-content .highlight {
    color: var(--red);
    font-weight: 500;
  }

  .category-content .good {
    color: var(--teal);
    font-weight: 500;
  }

  .destiny-stars-row {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }

  .destiny-stars-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .destiny-overall {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    background: rgba(201,168,76,0.04);
  }

  .overall-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
  }

  .overall-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.92rem;
    color: var(--ink);
    line-height: 1.9;
  }

  /* ─── 운세 강도 바 ─── */
  .luck-bar-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0.4rem 0;
  }

  .luck-bar-label {
    font-size: 0.72rem;
    color: var(--muted);
    width: 3rem;
    flex-shrink: 0;
  }

  .luck-bar-track {
    flex: 1;
    height: 4px;
    background: rgba(201,168,76,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .luck-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .luck-bar-fill.good  { background: var(--teal-light); }
  .luck-bar-fill.mid   { background: var(--gold); }
  .luck-bar-fill.caution { background: var(--red-light); }

  .luck-bar-score {
    font-size: 0.7rem;
    color: var(--muted);
    width: 1.5rem;
    text-align: right;
  }

  /* ─── 타임라인 ─── */
  .timeline-section {
    margin-top: 1.5rem;
  }

  .timeline {
    position: relative;
    padding-left: 1.5rem;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 0.3rem;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }

  .timeline-item {
    position: relative;
    padding-bottom: 1.2rem;
  }

  .timeline-dot {
    position: absolute;
    left: -1.2rem;
    top: 0.25rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: var(--paper-light);
  }

  .timeline-dot.critical {
    background: var(--red);
    border-color: var(--red);
  }

  .timeline-dot.good {
    background: var(--teal);
    border-color: var(--teal);
  }

  .timeline-age {
    font-size: 0.7rem;
    color: var(--gold-dark);
    font-weight: 500;
    margin-bottom: 0.15rem;
  }

  .timeline-event {
    font-size: 0.82rem;
    color: var(--ink);
    line-height: 1.6;
  }

  /* ─── 푸터 ─── */
  .footer {
    text-align: center;
    padding: 2rem 0 0;
    font-size: 0.7rem;
    color: rgba(201,168,76,0.35);
    letter-spacing: 0.2em;
    line-height: 2;
  }

  /* ─── 로딩 ─── */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--gold);
    font-family: 'Noto Serif KR', serif;
    letter-spacing: 0.3em;
    display: none;
  }

  .loading.show { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .loading span {
    display: inline-block;
    animation: pulse 1.5s ease infinite;
  }

  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }

  @media (max-width: 600px) {
    .palace-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(5, minmax(80px, auto)); }
    .palace.center-void { grid-column: 1 / 4; grid-row: 3 / 4; }
    .profile-divider { display: none; }
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-symbol">紫 微 斗 數</div>
    <h1>자미두수 명반</h1>
    <div class="header-sub">인생 시기별 운명 예측 · 당나라 금서 비전술</div>
    <div class="header-divider"></div>
  </div>

  <!-- 입력 카드 -->
  <div class="input-card">
    <div class="section-title">생년월일시 입력</div>
    <div class="form-grid">
      <div class="form-group">
        <label>출생 연도</label>
        <input type="number" id="inp-year" value="1990" min="1900" max="2010">
      </div>
      <div class="form-group">
        <label>출생 월</label>
        <select id="inp-month">
          <option value="1">1월</option><option value="2">2월</option>
          <option value="3">3월</option><option value="4">4월</option>
          <option value="5" selected>5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option>
          <option value="9">9월</option><option value="10">10월</option>
          <option value="11">11월</option><option value="12">12월</option>
        </select>
      </div>
      <div class="form-group">
        <label>출생 일</label>
        <input type="number" id="inp-day" value="15" min="1" max="31">
      </div>
      <div class="form-group">
        <label>출생 시각 (12지지)</label>
        <select id="inp-hour">
          <option value="-1">모름 (시주 없음)</option>
          <option value="23">子時 · 자시 (23~01시)</option>
          <option value="1">丑時 · 축시 (01~03시)</option>
          <option value="3">寅時 · 인시 (03~05시)</option>
          <option value="5">卯時 · 묘시 (05~07시)</option>
          <option value="7">辰時 · 진시 (07~09시)</option>
          <option value="9">巳時 · 사시 (09~11시)</option>
          <option value="11" selected>午時 · 오시 (11~13시)</option>
          <option value="13">未時 · 미시 (13~15시)</option>
          <option value="15">申時 · 신시 (15~17시)</option>
          <option value="17">酉時 · 유시 (17~19시)</option>
          <option value="19">戌時 · 술시 (19~21시)</option>
          <option value="21">亥時 · 해시 (21~23시)</option>
        </select>
      </div>
      <div class="form-group">
        <label>성별</label>
        <div class="gender-toggle">
          <input type="radio" name="gender" id="g-male" value="male" checked>
          <label for="g-male">남 ♂</label>
          <input type="radio" name="gender" id="g-female" value="female">
          <label for="g-female">여 ♀</label>
        </div>
      </div>
      <div class="form-group">
        <label>날짜 유형</label>
        <select id="inp-lunar" onchange="toggleLeapMonth()">
          <option value="solar">양력 (陽曆)</option>
          <option value="lunar">음력 (陰曆)</option>
        </select>
      </div>
      <div class="form-group" id="leap-group" style="display:none;">
        <label>윤달 여부</label>
        <div class="gender-toggle">
          <input type="radio" name="leapmonth" id="lm-no" value="0" checked>
          <label for="lm-no">평달</label>
          <input type="radio" name="leapmonth" id="lm-yes" value="1">
          <label for="lm-yes">윤달 閏</label>
        </div>
      </div>
    </div>
    <button class="btn-calc" onclick="calculate()">◈ 자미두수 명반 보기 ◈</button>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <span>命</span><span>盤</span><span>算</span> 명반 계산 중…
  </div>

  <!-- 결과 -->
  <div id="result">

    <!-- 기본 정보 바 -->

      const m = Math.floor((yyyymmdd % 10000) / 100);

      const abs = _ymd2abs(y, m, d);

  })();

  // 연도 → LUNAR_INFO 인덱스 (1900=0)
  function _lunarIdx(year) { return year - 1900; }

  // 해당 음력 연도의 월별 일수 배열 반환
  // 반환: [{month, isLeap, days}, …] 순서대로 (윤달 포함)
  function _monthList(lunarYear) {
    const info = LUNAR_INFO[_lunarIdx(lunarYear)];
    if (!info) return [];
    const { monthArr, leap } = info;
    const list = [];
    let arrIdx = 0;
    for (let m = 1; m <= 12; m++) {
      list.push({ month: m, isLeap: false, days: monthArr[arrIdx] ? 30 : 29 });
      arrIdx++;
      if (leap === m) {
        list.push({ month: m, isLeap: true, days: monthArr[arrIdx] ? 30 : 29 });
        arrIdx++;
      }
    }
    return list;
  }

  // ── 양력 → 음력 변환 ──
  function solarToLunar(sy, sm, sd) {
    const targetAbs = _ymd2abs(sy, sm, sd);

    let lunarYear = 1900;
    let absOfYear = LUNAR_INFO[0].abs;

    // 해당 음력 연도 찾기
    for (let y = 1900; y <= 2050; y++) {
      const info = LUNAR_INFO[_lunarIdx(y)];
      const nextInfo = LUNAR_INFO[_lunarIdx(y + 1)];
      if (!info) break;
      const nextAbs = nextInfo ? nextInfo.abs : info.abs + 385;
      if (targetAbs < nextAbs) { lunarYear = y; absOfYear = info.abs; break; }
    }

    // 해당 연도 내 월 탐색
    let rem = targetAbs - absOfYear;
    const mList = _monthList(lunarYear);
    let lunarMonth = 1, lunarDay = 1, isLeap = false;
    for (const m of mList) {
      if (rem < m.days) {
        lunarMonth = m.month;
        isLeap = m.isLeap;
        lunarDay = rem + 1;
        break;
      }
      rem -= m.days;
    }

    return { lunarYear, lunarMonth, lunarDay, isLeap };
  }

  // ── 음력 → 양력 변환 ──
  function lunarToSolar(ly, lm, ld, isLeapMonth) {
    const info = LUNAR_INFO[_lunarIdx(ly)];
    if (!info) return null;

    let abs = info.abs;
    const mList = _monthList(ly);

    for (const m of mList) {
      // 목표 월에 도달
      if (m.month === lm && m.isLeap === (isLeapMonth || false)) {
        abs += ld - 1;
        return _abs2ymd(abs);
      }
      abs += m.days;
    }
    return null; // 해당 월/윤달 없음
  }

  // ── 시지 → 실제 시각(사주용) 변환 ──
  // 입력값은 이미 각 지지의 대표 시각(홀수)이므로 그대로 사용
  // 자시(23), 축시(1), 인시(3)...
  function jizhiToHour(v) {
    if (v < 0) return -1;
    return v; // 이미 대표 시각으로 들어옴
  }

  // ── 메인 계산 ──
  function calculate(year, month, day, hourVal, gender, isLunarInput, isLeapMonth) {
    // 입력이 음력인 경우 양력으로 변환
    let solarYear = year, solarMonth = month, solarDay = day;
    let lunarYear = year, lunarMonth = month, lunarDay = day;
    let lunarIsLeap = isLeapMonth || false;

    if (isLunarInput) {
      const sol = lunarToSolar(year, month, day, isLeapMonth);
      if (!sol) throw new Error('음력 변환 실패: 범위를 확인하세요.');
      solarYear = sol.year; solarMonth = sol.month; solarDay = sol.day;
    } else {
      const lun = solarToLunar(year, month, day);
      lunarYear = lun.lunarYear; lunarMonth = lun.lunarMonth; lunarDay = lun.lunarDay;
      lunarIsLeap = lun.isLeap;
    }

    // 시각 처리 (12지지 대표값)
    const hour = jizhiToHour(hourVal);

    // 1. 만세력으로 사주 계산 (양력 기준)
    const pillars = Manseryok.getPillars(solarYear, solarMonth, solarDay, hour);
    const { yeonju, wolju, ilju, siju } = pillars;

    // 3. 오행국 결정
    const ju = getNayinJu(yeonju.stemIdx, yeonju.branchIdx);
    const juNum = WU_XING_JU[ju] || 2;

    // 4. 자미 위치
    const ziweiPos = getZiweiPalace(lunarDay, ju);

    // 5. 주요성 배치
    const mainStars = calcMainStars(ziweiPos);

    // 6. 조력성
    const assists = calcAssistStars(yeonju.stemIdx, yeonju.branchIdx, lunarMonth, hour);
    const allStars = { ...mainStars, ...assists };

    // 7. 사화
    const sihua = calcSihua(yeonju.stemIdx, allStars);

    // 8. 명궁
    const hourBranch = getHourBranch(hour);
    const mingGong = getMingGong(lunarMonth, hourBranch);

    // 9. 대운
    const daYunInfo = getDaYunStartAge(yeonju.stemIdx, gender);
    const daYunPalaces = getDaYunPalaces(mingGong, daYunInfo.forward);

    // 10. 12궁에 별 배분
    const palaceStars = Array.from({length:12}, () => ({ main:[], lucky:[], bad:[], sihua:[] }));
    const mainStarNames = ['자미','천기','태양','무곡','천동','염정','천부','태음','탐랑','거문','천상','천량','칠살','파군'];
    const luckyStarNames = ['문창','문곡','록존','좌보','우필','천마'];
    const badStarNames   = ['양인','화성','영성'];

    Object.entries(allStars).forEach(([name, pos]) => {
      const p = ((pos % 12) + 12) % 12;
      if (mainStarNames.includes(name)) palaceStars[p].main.push(name);
      else if (luckyStarNames.includes(name)) palaceStars[p].lucky.push(name);
      else if (badStarNames.includes(name)) palaceStars[p].bad.push(name);
    });
    Object.entries(sihua).forEach(([pos, tags]) => {
      palaceStars[parseInt(pos)].sihua.push(...tags);
    });

    return {
      pillars, yeonju, wolju, ilju, siju,
      lunarYear, lunarMonth, lunarDay, lunarIsLeap,
      solarYear, solarMonth, solarDay,
      ju, juNum,
      ziweiPos, mingGong, hourBranch,
      mainStars, assists, allStars, sihua,
      palaceStars, daYunInfo, daYunPalaces,
      gender,
      inputYear: year, inputMonth: month, inputDay: day,
      isLunarInput, hour,
    };
  }

  return { calculate, PALACE_NAMES, JIJI, JIJI_HJ, solarToLunar, lunarToSolar };
})();

  generateAgeReading(data, ageGroup) {

let currentData = null;

function toggleLeapMonth() {
  const isLunar = document.getElementById('inp-lunar').value === 'lunar';
  document.getElementById('leap-group').style.display = isLunar ? '' : 'none';
}

function calculate() {
  const year   = parseInt(document.getElementById('inp-year').value);
  const month  = parseInt(document.getElementById('inp-month').value);
  const day    = parseInt(document.getElementById('inp-day').value);
  const hour   = parseInt(document.getElementById('inp-hour').value);
  const gender = document.querySelector('input[name="gender"]:checked').value;
  const isLunarInput = document.getElementById('inp-lunar').value === 'lunar';
  const leapEl = document.querySelector('input[name="leapmonth"]:checked');
  const isLeapMonth = leapEl ? leapEl.value === '1' : false;

  if (!year || !month || !day) { alert('생년월일을 모두 입력해주세요.'); return; }
  if (year < 1900 || year > 2050) { alert('지원 범위는 1900~2050년입니다.'); return; }

  document.getElementById('loading').classList.add('show');
  document.getElementById('result').style.display = 'none';

  setTimeout(() => {
    try {
      currentData = ZiWei.calculate(year, month, day, hour, gender, isLunarInput, isLeapMonth);
      renderAll(currentData);
      document.getElementById('loading').classList.remove('show');
      document.getElementById('result').style.display = 'block';
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      document.getElementById('loading').classList.remove('show');
      alert('계산 중 오류가 발생했습니다: ' + e.message);
      console.error(e);
    }
  }, 600);
}

function renderAll(data) {
  renderProfile(data);
  renderPalaceGrid(data);
  renderDestinySection(data);
}

  const bar = document.getElementById('profile-bar');

  const jizhiNames = ['자시(子)','축시(丑)','인시(寅)','묘시(卯)','진시(辰)','사시(巳)',
                       '오시(午)','미시(未)','신시(申)','유시(酉)','술시(戌)','해시(亥)'];
  const hourBranchName = hour < 0 ? '미상' : jizhiNames[data.hourBranch] || '미상';

  const lunarStr = `${lunarYear}년 ${lunarMonth}월${lunarIsLeap ? ' 【윤】' : ''} ${lunarDay}일`;
  const solarStr = `${solarYear}년 ${solarMonth}월 ${solarDay}일`;

  const items = [
    { label: '양력', value: solarStr },
    { label: '음력', value: lunarStr },
    { label: '성별', value: gender === 'male' ? '남성 ♂' : '여성 ♀' },
    { label: '연주 年柱', value: `${yeonju.ganHJ}${yeonju.jiHJ} (${yeonju.label})` },
    { label: '월주 月柱', value: `${wolju.ganHJ}${wolju.jiHJ} (${wolju.label})` },
    { label: '일주 日柱', value: `${ilju.ganHJ}${ilju.jiHJ} (${ilju.label})` },
    { label: '시주 時柱', value: siju ? `${siju.ganHJ}${siju.jiHJ} (${siju.label}) · ${hourBranchName}` : `미상 · ${hourBranchName}` },
    { label: '오행국', value: juNames[ju] || '수이국' },
  ];

  bar.innerHTML = items.map((it, i) =>
    (i > 0 ? '<div class="profile-divider"></div>' : '') +
    `<div class="profile-item">
      <span class="profile-label">${it.label}</span>
      <span class="profile-value">${it.value}</span>
    </div>`
  ).join('');
}

function renderPalaceGrid(data) {
  const { palaceStars, mingGong, daYunInfo, daYunPalaces, sihua } = data;
  const grid = document.getElementById('palace-grid');

  // 12궁 배치: 시계반대 방향, 인(2)부터 시작
  // 실제 위치 매핑 (4x4 그리드에서 중앙 2x2 제외)
  // 궁 인덱스 → 그리드 위치 (row, col) 1-based
  const gridPositions = [
    // 자(0)~해(11) 순서로 그리드 위치
    [4,4], [4,3], [4,2], [4,1],   // 자 축 인 묘
    [3,1], [2,1], [1,1], [1,2],   // 진 사 오 미
    [1,3], [1,4], [2,4], [3,4],   // 신 유 술 해
  ];

  // 명궁 이름 배치 (명궁 위치에서 시계방향으로 12궁 이름 배치)
  // 명궁=mingGong 지지, 그 다음 시계방향으로 형제·부처 순
  const palaceNameAtBranch = Array(12);
  for (let i = 0; i < 12; i++) {
    palaceNameAtBranch[(mingGong + i) % 12] = ZiWei.PALACE_NAMES[i];
  }

  // 대운 표시
  const daYunDisplay = {};
  daYunPalaces.forEach((palaceJiIdx, i) => {
    const ageStart = 10 + i * 10;
    if (!daYunDisplay[palaceJiIdx]) daYunDisplay[palaceJiIdx] = [];
    daYunDisplay[palaceJiIdx].push(ageStart + '대');
  });

  let html = '';
  for (let branchIdx = 0; branchIdx < 12; branchIdx++) {
    const [row, col] = gridPositions[branchIdx];
    const ps = palaceStars[branchIdx];
    const isMing = branchIdx === mingGong;
    const pName = palaceNameAtBranch[branchIdx] || '';
    const sihuaTags = (data.sihua[branchIdx] || []);

    const starBadges = [
      ...ps.main.map(s => `<span class="star-badge star-main">${s}</span>`),
      ...ps.lucky.map(s => `<span class="star-badge star-lucky">${s}</span>`),
      ...ps.bad.map(s => `<span class="star-badge star-bad">${s}</span>`),
      ...sihuaTags.map(s => `<span class="star-badge" style="background:rgba(139,32,32,0.2);color:var(--red);border:0.5px solid rgba(139,32,32,0.5);font-size:0.55rem;">${s}</span>`),
    ].join('');

    const daYunLabel = daYunDisplay[branchIdx] ? daYunDisplay[branchIdx].join(' ') : '';

    html += `<div class="palace" style="grid-row:${row};grid-column:${col};" onclick="showPalaceDetail(${branchIdx})">
      <div class="palace-header">
        <span class="palace-name" style="${isMing ? 'color:var(--red);font-weight:600;' : ''}">${pName}${isMing ? ' ★' : ''}</span>
        <span class="palace-branch">${ZiWei.JIJI_HJ[branchIdx]}</span>
      </div>
      <div class="palace-stars">${starBadges}</div>
      ${daYunLabel ? `<div class="palace-daeyun">${daYunLabel}</div>` : ''}
    </div>`;
  }

  // 중앙 빈 공간
  html += `<div class="palace center-void" style="grid-row:2/4;grid-column:2/4;">
    <div class="center-text">
      <div class="big">命</div>
      <div class="sm">자미두수 명반</div>
      <div class="sm" style="margin-top:0.5rem;font-size:0.65rem;">명궁 · ${ZiWei.JIJI_HJ[mingGong]}궁</div>
    </div>
  </div>`;

  grid.innerHTML = html;
}

function renderDestinySection(data) {
  const ages = [10,20,30,40,50,60,70,80];
  const tabsEl = document.getElementById('age-tabs');
  const cardsEl = document.getElementById('destiny-cards');

  tabsEl.innerHTML = ages.map((age, i) =>
    `<button class="age-tab ${i===0?'active':''}" onclick="switchAge(${age}, this)">${age}대</button>`
  ).join('');

  cardsEl.innerHTML = ages.map((age, i) => {
    const reading = INTERPRETATIONS.generateAgeReading(data, age);
    return renderDestinyCard(reading, i === 0);
  }).join('');
}

function renderDestinyCard(r, isActive) {
  const barColor = r.luckScore >= 70 ? 'good' : r.luckScore >= 45 ? 'mid' : 'caution';
  const luckLabel = r.luckScore >= 70 ? '길운' : r.luckScore >= 55 ? '중길' : r.luckScore >= 40 ? '평운' : '주의';
  const domStarInfo = r.dominantStar && INTERPRETATIONS.starTraits[r.dominantStar];

  const bars = [
    { label: '재물운', val: Math.min(95, r.luckScore + (Math.random()*10-5|0)), color: 'good' },
    { label: '애정운', val: Math.min(95, r.luckScore + (Math.random()*12-6|0)), color: 'good' },
    { label: '건강운', val: Math.min(95, r.luckScore + (Math.random()*8-4|0)), color: barColor },
    { label: '직업운', val: Math.min(95, r.luckScore + (Math.random()*10-5|0)), color: 'good' },
  ].map(b => `
    <div class="luck-bar-row">
      <span class="luck-bar-label">${b.label}</span>
      <div class="luck-bar-track"><div class="luck-bar-fill ${b.val>=60?'good':b.val>=45?'mid':'caution'}" style="width:${b.val}%"></div></div>
      <span class="luck-bar-score">${b.val|0}</span>
    </div>
  `).join('');

  const timeline = r.timeline.map(t =>
    `<div class="timeline-item">
      <div class="timeline-dot ${t.type}"></div>
      <div class="timeline-age">${t.offset}</div>
      <div class="timeline-event">${t.text}</div>
    </div>`
  ).join('');

  return `<div class="destiny-card ${isActive ? 'active' : ''}" data-age="${r.ageGroup}">
    <div class="destiny-header">
      <div>
        <div class="destiny-age-title">${r.ageGroup}대 운세</div>
        <div class="destiny-palace-name">대운궁 · ${r.palaceName} (${r.daYunBranchHJ}궁) · ${r.theme}</div>
      </div>
      <div style="text-align:right;">
        <div class="destiny-pillar">${r.daYunBranchHJ} ${r.luckType}</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">${domStarInfo ? domStarInfo.power + ' 영향' : '복합 운기'}</div>
      </div>
    </div>

    <div style="padding:1rem 1.5rem 0.5rem; border-bottom:1px solid var(--border);">
      <div style="font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:0.5rem;">운세 강도</div>
      ${bars}
    </div>

    <div class="destiny-body">
      <div class="destiny-category">
        <div class="category-icon-title">
          <span class="category-icon">♡</span>
          <span class="category-title">연애 · 결혼 · 부부관계</span>
        </div>
        <div class="category-content">${r.categories.love}</div>
      </div>
      <div class="destiny-category">
        <div class="category-icon-title">
          <span class="category-icon">◎</span>
          <span class="category-title">직업 · 재물 · 취업이직</span>
        </div>
        <div class="category-content">${r.categories.career}</div>
      </div>
      <div class="destiny-category">
        <div class="category-icon-title">
          <span class="category-icon">✦</span>
          <span class="category-title">주요 사건사고 예측</span>
        </div>
        <div class="category-content">${r.categories.events}</div>
      </div>
      <div class="destiny-category">
        <div class="category-icon-title">
          <span class="category-icon">◈</span>
          <span class="category-title">건강 · 신체 관리</span>
        </div>
        <div class="category-content">${r.categories.health}</div>
      </div>
    </div>

    <div class="destiny-overall">
      <div class="overall-label">연도별 주요 시기 흐름</div>
      <div class="timeline-section">
        <div class="timeline">${timeline}</div>
      </div>
    </div>

    ${r.pStars.main.length || r.pStars.lucky.length ? `
    <div class="destiny-stars-row">
      <span class="destiny-stars-label">대운 영향성 ·</span>
      ${r.pStars.main.map(s => `<span class="star-badge star-main">${s}</span>`).join('')}
      ${r.pStars.lucky.map(s => `<span class="star-badge star-lucky">${s}</span>`).join('')}
      ${r.pStars.bad.map(s => `<span class="star-badge star-bad">${s}</span>`).join('')}
      ${r.pStars.sihua.map(s => `<span class="star-badge" style="background:rgba(139,32,32,0.2);color:var(--red);font-size:0.6rem;padding:1px 4px;border:0.5px solid rgba(139,32,32,0.4);">${s}</span>`).join('')}
    </div>` : ''}
  </div>`;
}

function switchAge(age, btn) {
  document.querySelectorAll('.age-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.destiny-card').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.age) === age);
  });
}

function showPalaceDetail(branchIdx) {
  if (!currentData) return;
  const pName = (() => {
    const m = currentData.mingGong;
    for (let i = 0; i < 12; i++) {
      if ((m + i) % 12 === branchIdx) return ZiWei.PALACE_NAMES[i];
    }
    return '궁';
  })();
  const ps = currentData.palaceStars[branchIdx];
  const allS = [...ps.main, ...ps.lucky, ...ps.bad, ...ps.sihua];
  const branch = ZiWei.JIJI_HJ[branchIdx];
  alert(`【 ${branch}궁 · ${pName} 】\n\n` +
    `주요성: ${ps.main.join(', ') || '없음'}\n` +
    `길성: ${ps.lucky.join(', ') || '없음'}\n` +
    `흉성: ${ps.bad.join(', ') || '없음'}\n` +
    `사화: ${ps.sihua.join(', ') || '없음'}`
  );
}
</script>
