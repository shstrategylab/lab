<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일진법 — 사주 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<style>
:root {
  --ink: #1a1208;
  --paper: #f5f0e8;
  --paper2: #ede6d6;
  --gold: #b8860b;
  --gold-light: #d4a843;
  --red: #8b2020;
  --blue: #1a3a5c;
  --muted: #6b5d4a;
  --border: rgba(90,70,40,0.18);
  --radius: 12px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(184,134,11,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(139,32,32,0.05) 0%, transparent 55%);
}

/* ─── header ─── */
header {
  text-align: center;
  padding: 48px 24px 32px;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-family: 'Gowun Batang', serif;
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--ink);
}
header p {
  margin-top: 8px;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.08em;
}
.hanja { font-size: 0.75em; opacity: 0.5; margin-left: 6px; }

/* ─── layout ─── */
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: start;
}
@media(max-width:680px){ main { grid-template-columns:1fr; } }

/* ─── panels ─── */
.panel {
  background: rgba(255,252,245,0.8);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
}
.panel-title {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ─── form ─── */
.field { margin-bottom: 18px; }
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
input[type=date], input[type=time], select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
input[type=date]:focus, input[type=time]:focus, select:focus {
  border-color: var(--gold);
}
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

.btn {
  width: 100%;
  padding: 13px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 8px;
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  letter-spacing: 0.12em;
  cursor: pointer;
  margin-top: 6px;
  transition: background .2s, transform .1s;
}
.btn:hover { background: #2d1f0a; }
.btn:active { transform: scale(0.98); }

/* ─── pillars (四柱) ─── */
.pillars {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  margin: 16px 0;
}
.pillar {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 6px;
  text-align: center;
}
.pillar-label { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; margin-bottom: 8px; }
.pillar-gan {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.pillar-ji {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.pillar-sub { font-size: 10px; color: var(--muted); }

/* element colors */
.elem-목 { color: #2d6a2d; }
.elem-화 { color: var(--red); }
.elem-토 { color: #8b6914; }
.elem-금 { color: #4a4a6a; }
.elem-수 { color: var(--blue); }

/* ─── ilseonig table ─── */
.seong-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:12px; }
.seong-table th {
  background: var(--paper2);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 7px 10px;
  border: 1px solid var(--border);
  text-align: center;
}
.seong-table td {
  padding: 7px 10px;
  border: 1px solid var(--border);
  text-align: center;
  font-size: 13px;
}

/* ─── interpretation ─── */
.interp-block {
  background: var(--paper2);
  border-left: 3px solid var(--gold);
  border-radius: 0 8px 8px 0;
  padding: 14px 16px;
  margin: 12px 0;
}
.interp-block h4 { font-size: 12px; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 6px; }
.interp-block p { font-size: 13px; line-height: 1.8; color: var(--ink); }

.tag {
  display: inline-block;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  margin: 3px 3px 3px 0;
  border: 1px solid var(--border);
  background: var(--paper);
  color: var(--muted);
}
.tag.주의 { border-color: var(--red); color: var(--red); background: rgba(139,32,32,0.06); }
.tag.길 { border-color: #2d6a2d; color: #2d6a2d; background: rgba(45,106,45,0.06); }
.tag.흉 { border-color: var(--red); color: var(--red); background: rgba(139,32,32,0.06); }
.tag.공망 { border-color: var(--blue); color: var(--blue); background: rgba(26,58,92,0.08); }

.hidden { display:none; }
#result { grid-column: 1 / -1; }

/* ─── today bar ─── */
.today-bar {
  text-align:center;
  font-size:13px;
  color:var(--muted);
  margin-bottom: 20px;
  letter-spacing: 0.06em;
}
.today-bar span { color: var(--gold); font-weight: 600; }

/* ─── gungham 궁합 comparison ─── */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
  margin: 12px 0;
}
.vs-badge {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; letter-spacing: 0.04em;
}
.big-char { font-size: 38px; font-weight: 700; text-align:center; line-height:1; }
.small-label { font-size: 11px; color: var(--muted); text-align:center; margin-top:4px; }

.divider { border:none; border-top:1px solid var(--border); margin: 20px 0; }
</style>
</head>
<body>

<header>
  <h1>일진법<span class="hanja">日辰法</span></h1>
  <p>사주팔자 × 오늘의 기운 — 실시간 내정 분석</p>
</header>

<main>

<!-- 입력 패널 -->
<div class="panel">
  <div class="panel-title">내 사주 입력</div>

  <div class="field">
    <label>생년월일</label>
    <input type="date" id="birth-date" value="1975-09-02">
  </div>
  <div class="row2">
    <div class="field">
      <label>출생 시각</label>
      <input type="time" id="birth-time" value="01:30">
    </div>
    <div class="field">
      <label>양력 / 음력</label>
      <select id="cal-type">
        <option value="solar">양력</option>
        <option value="lunar">음력</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label>성별</label>
    <select id="gender">
      <option value="M">남성</option>
      <option value="F">여성</option>
    </select>
  </div>

  <hr class="divider">
  <div class="panel-title">분석할 날짜</div>
  <div class="field">
    <label>날짜 (일진 기준)</label>
    <input type="date" id="target-date" value="">
  </div>
  <div class="field">
    <label>시각 (시주 분석용)</label>
    <input type="time" id="target-time" value="12:00">
  </div>

  <button class="btn" onclick="analyze()">일진법으로 분석하기</button>
  <div id="lunar-notice" style="display:none;margin-top:10px;font-size:12px;color:var(--blue);background:rgba(26,58,92,0.07);border-radius:6px;padding:8px 12px;letter-spacing:0.04em;"></div>
</div>

<!-- 사주 미리보기 패널 -->
<div class="panel">
  <div class="panel-title">사주 명식<span style="float:right;font-size:10px;color:var(--muted);">시 · 일 · 월 · 연</span></div>
  <div class="today-bar" id="today-bar">오늘 일진을 로딩 중...</div>
  <div class="pillars" id="pillars">
    <div class="pillar"><div class="pillar-label">시주</div><div class="pillar-gan">—</div><div class="pillar-ji">—</div></div>
    <div class="pillar"><div class="pillar-label">일주 ★</div><div class="pillar-gan">—</div><div class="pillar-ji">—</div></div>
    <div class="pillar"><div class="pillar-label">월주</div><div class="pillar-gan">—</div><div class="pillar-ji">—</div></div>
    <div class="pillar"><div class="pillar-label">연주</div><div class="pillar-gan">—</div><div class="pillar-ji">—</div></div>
  </div>
  <p style="font-size:11px;color:var(--muted);text-align:center;">생년월일을 입력하고 분석 버튼을 누르세요</p>
</div>

<!-- 결과 (전체 너비) -->
<div id="result" class="hidden">
  <div class="panel">
    <div class="panel-title">일진법 분석 결과</div>
    <div id="result-inner"></div>
  </div>
</div>

</main>

<script>
// ══════════════════════════════════════════
// 1. 기초 데이터
// ══════════════════════════════════════════
const GAN  = ['갑','을','병','정','무','기','경','신','임','계'];
const JI   = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
const GAN_ELEM = ['목','목','화','화','토','토','금','금','수','수'];
const JI_ELEM  = ['수','토','목','목','토','화','화','토','금','금','토','수'];
const GAN_HANJA  = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const JI_HANJA   = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ANIMAL = ['쥐','소','범','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];

// 십성 (일간idx, 타간idx) -> 십성명
function sipseong(ilGanIdx, targetGanIdx, gender) {
  const ilElem = GAN_ELEM[ilGanIdx];
  const tElem  = GAN_ELEM[targetGanIdx];
  const ilYin  = ilGanIdx % 2 === 1;
  const tYin   = targetGanIdx % 2 === 1;
  const same   = ilYin === tYin;
  const rel    = ohaengRel(ilElem, tElem);
  if (rel === 'same') return same ? '비견' : '겁재';
  if (rel === 'gen')  return same ? '식신' : '상관';   // 내가 生: 음양같음→식신
  if (rel === '克me') return same ? '편관' : '정관';   // 나를 克: 음양같음→편관, 다름→정관
  if (rel === '克them') return same ? '편재' : '정재'; // 내가 克: 음양같음→편재, 다름→정재
  if (rel === 'me生') return same ? '편인' : '정인';   // 나를 生: 음양같음→편인, 다름→정인
  return '—';
}
function sipseongJi(ilGanIdx, jiIdx, gender) {
  const jiElem = JI_ELEM[jiIdx];
  const ganElems = { '목':0,'화':2,'토':4,'금':6,'수':8 };
  const refIdx = ganElems[jiElem];
  return sipseong(ilGanIdx, refIdx, gender);
}
function ohaengRel(a, b) {
  const genOrder = ['목','화','토','금','수'];
  const克 = {'목':'토','화':'금','토':'수','금':'목','수':'화'};
  if (a === b) return 'same';
  const aIdx = genOrder.indexOf(a), bIdx = genOrder.indexOf(b);
  if ((aIdx+1)%5 === bIdx) return 'gen';
  if (克[a] === b) return '克them';
  if (克[b] === a) return '克me';
  if ((bIdx+1)%5 === aIdx) return 'me生';
  return 'other';
}

// 십성 해석
const SEONG_INTERP = {
  '비견': {purpose:'경쟁·동업·친구 문제', mind:'자존심이 세지고 독립적 판단 욕구 강해짐', tag:'비겁'},
  '겁재': {purpose:'경쟁·재물 뺏길 우려', mind:'주변과 갈등·손재수 주의', tag:'비겁'},
  '식신': {purpose:'새로운 일·의식주·자녀', mind:'창의력과 표현욕 왕성, 여유로운 날', tag:'식상'},
  '상관': {purpose:'표현·갈등·이직 고민', mind:'말이 앞서고 관계 갈등 가능', tag:'식상'},
  '정재': {purpose:'돈·결과물·현실 문제', mind:'실질적 이득에 집중, 안정 지향', tag:'재성'},
  '편재': {purpose:'횡재·큰 돈·갑작스러운 변화', mind:'투자·도전 욕구 강해짐', tag:'재성'},
  '정관': {purpose:'직장·명예·규칙', mind:'책임감과 사회적 역할 의식 상승', tag:'관성'},
  '편관': {purpose:'압박·시험·변화된 권력', mind:'스트레스·결단 압박 강해짐', tag:'관성'},
  '정인': {purpose:'계약·문서·공부·어머니', mind:'수용력과 학습욕 높아짐', tag:'인성'},
  '편인': {purpose:'아이디어·역술·특이한 정보', mind:'예민함과 고독감, 직관력 상승', tag:'인성'},
};

// 12신살
function sibisisal(yearJiIdx, targetJiIdx) {
  const base = yearJiIdx;
  const diff = ((targetJiIdx - base) + 12) % 12;
  const names = ['겁살','재살','천살','지살','년살','월살','망신살','장성살','반안살','역마살','육해살','화개살'];
  return names[diff];
}
const SISAL_INTERP = {
  '겁살':  {mean:'손재·관재수·강제 변화',     mood:'뺏기는 기분, 방어적 심리'},
  '재살':  {mean:'관재·소송·질병 주의',        mood:'불안과 두려움, 법적 문제 고민'},
  '천살':  {mean:'불가항력적 사건·천재지변',   mood:'하늘의 뜻에 순응, 체념'},
  '지살':  {mean:'이동·여행·주거 변화',        mood:'장소에 대한 불안'},
  '년살':  {mean:'이성 문제·연애·도화',        mood:'감수성과 매력 상승'},
  '월살':  {mean:'고독·막힘·걸림돌',          mood:'의지하고 싶은 심리'},
  '망신살':{mean:'망신·실수·실수로 인한 손해', mood:'창피함과 당혹감'},
  '장성살':{mean:'권위·통솔·리더십',           mood:'자신감과 추진력'},
  '반안살':{mean:'승진·금전 이득·안정',        mood:'기대감과 현실적 욕심'},
  '역마살':{mean:'이동·출장·바쁜 움직임',      mood:'분주함과 이동 욕구'},
  '육해살':{mean:'관계 갈등·방해·훼방',        mood:'억울함과 배신감'},
  '화개살':{mean:'과거·종교·철학·재발',        mood:'회상과 내면 성찰'},
};

// 공망 계산
function gongmang(ganIdx, jiIdx) {
  const cycle60 = ganIdx % 10;
  const jiMod   = jiIdx % 12;
  // 공망 = 해당 순(旬)의 마지막 두 지지
  // 순 시작: gan%10=0일 때 ji는 정해진 값
  // 공망 지지 = (ji_start + 10) % 12, (ji_start + 11) % 12
  const순시작Ji = (jiIdx - ganIdx + 60) % 12;
  const gm1 = (순시작Ji + 10) % 12;
  const gm2 = (순시작Ji + 11) % 12;
  return [gm1, gm2];
}

// 합충형파해
function gajung(ji1, ji2) {
  const result = [];
  // 육합
  const yukHap = [[0,1],[1,0],[2,11],[11,2],[3,10],[10,3],[4,9],[9,4],[5,8],[8,5],[6,7],[7,6]];
  if (yukHap.some(p=>p[0]===ji1&&p[1]===ji2)) result.push({type:'육합', effect:'순조·협력·성사 가능성 높음'});
  // 삼합 (방합 포함)
  const samHap3 = [[2,6,10],[3,7,11],[0,4,8],[1,5,9]];
  const names3  = ['인오술','묘미해','자진신','축사유'];
  samHap3.forEach((g,i)=>{ if(g.includes(ji1)&&g.includes(ji2)) result.push({type:`삼합(${names3[i]})`, effect:'에너지 증폭·세력 확장'}); });
  // 충
  if ((Math.abs(ji1-ji2)===6)) result.push({type:'충(沖)', effect:'변화·이동·깨짐·결정 압박'});
  // 형 (인사신 삼형, 축술미 삼형, 자형: 진·오·유·해)
  const hyung = [[2,5],[5,8],[8,2],[1,10],[10,7],[7,1],[4,4],[6,6],[9,9],[11,11]];
  if (hyung.some(p=>p[0]===ji1&&p[1]===ji2)) result.push({type:'형(刑)', effect:'갈등·법적 문제·자충수'});
  return result;
}

// 합충 (천간)
function ganGajung(g1, g2) {
  const result = [];
  const hap = [[0,5],[1,6],[2,7],[3,8],[4,9]]; // 갑기 을경 병신 정임 무계
  if (hap.some(p=>(p[0]===g1&&p[1]===g2)||(p[0]===g2&&p[1]===g1))) result.push({type:'천간합', effect:'화합·성사·협력 유리'});
  if (Math.abs(g1-g2)===6) result.push({type:'천간충', effect:'대립·변동·에너지 충돌'});
  return result;
}

// ══════════════════════════════════════════
// 2. 만세력 핵심 계산
// ══════════════════════════════════════════

// 율리우스일수 → 60갑자 인덱스
function jd(y,m,d){
  const a=Math.floor((14-m)/12), yr=y+4800-a, mo=m+12*a-3;
  return d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;
}

// 기준일: 2000-01-01 = 갑술(甲戌)일 (다수 만세력 검증)
const ILJU_BASE_JD  = 2451545; // jd(2000,1,1)
const ILJU_BASE_GAN = 0;       // 갑
const ILJU_BASE_JI  = 10;      // 술
function ilju(year, month, day) {
  const diff = jd(year, month, day) - ILJU_BASE_JD;
  const ganIdx = ((ILJU_BASE_GAN + diff) % 10 + 10) % 10;
  const jiIdx  = ((ILJU_BASE_JI  + diff) % 12 + 12) % 12;
  return { ganIdx, jiIdx };
}

const JEOLGI_CUT_FALLBACK = [6, 4, 6, 5, 6, 6, 7, 8, 8, 8, 7, 7];

function getJeolgiCutDay(year, month) {
  const row = JEOLGI_TABLE[year];
  return row ? row[month - 1] : JEOLGI_CUT_FALLBACK[month - 1];
}

// 절기 기준 월 번호 반환 (1=소한~입춘전, 2=입춘~경칩전, ..., 12=대설~소한전)
// 반환값: 1~12 (명리학 월지: 1→축(1), 2→인(2), ..., 12→자(0))
function getJeolgiMonth(year, month, day) {
  // 절입일 당일부터 다음 월로 전환
  const cutDay = getJeolgiCutDay(year, month);
  let jeolMonth = day >= cutDay ? month : month - 1;
  if (jeolMonth <= 0) jeolMonth += 12;
  return jeolMonth; // 1~12
}

// 절기 월번호 → 지지 인덱스
// jeolMonth: 1→축(1), 2→인(2), ..., 11→해(11), 12→자(0)
function jeolMonthToJiIdx(jeolMonth) {
  if (jeolMonth === 12) return 0; // 자월(子月)
  return jeolMonth;               // 1→1(축), 2→2(인), ..., 11→11(해)
}

// 연주 (입춘 기준: 소한~입춘전=jeolMonth 1이면 전년)
function yeonju(year, month, day) {
  let y = year;
  if (getJeolgiMonth(year, month, day) === 1) y = year - 1;
  const ganIdx = ((y - 4) % 10 + 10) % 10;
  const jiIdx  = ((y - 4) % 12 + 12) % 12;
  return { ganIdx, jiIdx };
}

// 월주 (검증: 1975-09-02=갑신, 2000-02-05=무인, 1985-05-15=신사 ✅)
function wolju(year, month, day) {
  const jeolM  = getJeolgiMonth(year, month, day);
  const jiIdx  = jeolMonthToJiIdx(jeolM);
  const yGan   = yeonju(year, month, day).ganIdx;

  // 인월(寅月) 천간 시작: 갑기→병(2), 을경→무(4), 병신→경(6), 정임→임(8), 무계→갑(0)
  const inMonthGan = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0][yGan];

  // 인월(jeolM=2)=offset 0, 묘(3)=1, ..., 자(12)=10, 축(1)=11
  const offset = jeolM >= 2 ? jeolM - 2 : 11;
  const ganIdx = (inMonthGan + offset) % 10;

  return { ganIdx, jiIdx };
}

// 시주
function sinju(ilGanIdx, hour, minute) {
  // 시지 (자시=0시, 2시간 단위)
  const h = hour + minute/60;
  let siJiIdx;
  if (h >= 23 || h < 1) siJiIdx = 0;      // 자
  else if (h < 3)  siJiIdx = 1;            // 축
  else if (h < 5)  siJiIdx = 2;            // 인
  else if (h < 7)  siJiIdx = 3;            // 묘
  else if (h < 9)  siJiIdx = 4;            // 진
  else if (h < 11) siJiIdx = 5;            // 사
  else if (h < 13) siJiIdx = 6;            // 오
  else if (h < 15) siJiIdx = 7;            // 미
  else if (h < 17) siJiIdx = 8;            // 신
  else if (h < 19) siJiIdx = 9;            // 유
  else if (h < 21) siJiIdx = 10;           // 술
  else             siJiIdx = 11;            // 해
  // 시간 천간: 일간×2 + 시지
  const startGan = [0, 2, 4, 6, 8, 0, 2, 4, 6, 8][ilGanIdx];
  const ganIdx = (startGan + siJiIdx) % 10;
  return { ganIdx, jiIdx: siJiIdx };
}

}

  <div class="interp-block">
    <h4>천간 분석 — ${ganSeong} (${si.tag})</h4>
    <p><strong>방문 목적 추론:</strong> ${si.purpose}<br>
    <strong>심리 상태:</strong> ${si.mind}</p>
  </div>

  <div class="interp-block">
    <h4>지지 분석 — ${jiSeong} (${si2.tag})</h4>
    <p><strong>현실 환경:</strong> ${si2.purpose}<br>
    <strong>보조 심리:</strong> ${si2.mind}</p>
  </div>

  <div class="interp-block">
    <h4>12신살 — ${sisal}</h4>
    <p><strong>사건 성격:</strong> ${ss.mean}<br>
    <strong>심리 기조:</strong> ${ss.mood}</p>
  </div>
  `;

  // 공망 블록
  if (isGmJi || isGmGan) {
    html += `
  <div class="interp-block" style="border-left-color:var(--blue);">
    <h4>공망(空亡) 감지</h4>
    <p>오늘 일진이 공망에 해당합니다. 아무리 좋은 기운이 들어와도 결과가 허망하게 끝날 수 있습니다. 중요한 결정·계약·서명은 며칠 미루는 것을 권장합니다.</p>
  </div>`;
  }

  // 합충
  const allJung = [...ganjung, ...jijung];
  if (allJung.length > 0) {
    html += `<div class="interp-block" style="border-left-color:${allJung.some(x=>x.type.includes('충')||x.type.includes('형'))? 'var(--red)':'#2d6a2d'};">
    <h4>합·충·형 작용</h4>
    <p>${allJung.map(x=>`<strong>${x.type}:</strong> ${x.effect}`).join('<br>')}</p>
  </div>`;
  }

  // 종합 요약
  const 길흉 = (ganSeong==='정재'||ganSeong==='식신'||ganSeong==='정관'||ganSeong==='정인') ? '길' :
               (ganSeong==='겁재'||ganSeong==='편관'||ganSeong==='상관') ? '흉' : '중';
  const isChung = jijung.some(x=>x.type.includes('충'));
  const isHap   = jijung.some(x=>x.type.includes('합'));

  html += `
  <hr class="divider">
  <div>
    <div style="font-size:12px;letter-spacing:0.1em;color:var(--gold);margin-bottom:10px;">종합 태그</div>
    <span class="tag ${isGmJi?'공망':''}">${isGmJi?'공망':'공망 없음'}</span>
    <span class="tag ${길흉}">${ganSeong} — ${길흉 === '길' ? '길신' : 길흉 === '흉' ? '흉신' : '중성'}</span>
    <span class="tag">${sisal}</span>
    ${isChung ? '<span class="tag 주의">충(沖) — 결정 신중</span>' : ''}
    ${isHap   ? '<span class="tag 길">합(合) — 성사 유리</span>' : ''}
    ${isGmJi  ? '<span class="tag 공망">공망 — 결과 허망</span>' : ''}
  </div>

  <div style="margin-top:20px;padding:14px 16px;background:var(--paper2);border-radius:8px;font-size:13px;line-height:1.9;color:var(--ink);">
    <strong style="font-size:12px;letter-spacing:0.1em;color:var(--gold);">한 줄 요약</strong><br>
    ${targetDateLabel}(${iljinStr})에 <strong>${GAN[ij.ganIdx]}${JI[ij.jiIdx]} 일주</strong>인 당신에게는
    <strong>${ganSeong}</strong>의 기운이 들어왔습니다. ${si.purpose}에 마음이 쏠리는 날입니다.
    ${isGmJi ? '단, 공망이 겹쳐 실속 확보가 어려울 수 있습니다.' : ''}
    ${isChung ? '일진과 충이 발생하여 예상치 못한 변화나 마찰 주의.' : ''}
    ${isHap   ? '합의 기운으로 협력과 성사에 유리한 흐름.' : ''}
    ${ss.mean}의 에너지가 하루를 관통합니다.
  </div>
  `;

  document.getElementById('result-inner').innerHTML = html;
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
}
</script>
</body>
</html>
