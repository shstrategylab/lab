<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗數 사건사고 프롬프트 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --ink:#12111e;
  --ink2:#3d3c58;
  --ink3:#7e7d99;
  --gold:#b89a0e;
  --gold-light:#e8c840;
  --gold-pale:#fffbee;
  --gold-border:#e0cc60;
  --jade:#155c3f;
  --jade-light:#1a7a52;
  --jade-bg:#edf7f2;
  --jade-border:#b0ddc8;
  --surface:#ffffff;
  --surface2:#f7f5f0;
  --surface3:#efece4;
  --border:#ddd8cc;
  --border2:#c8c3b4;
  --danger:#7a1818;
  --danger-bg:#fff0f0;
  --warn-bg:#fff8e6;
  --warn-text:#7a5500;
  --radius:8px;
  --radius-lg:12px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}

html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--surface2);
  color:var(--ink);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
}

/* ── LAYOUT ── */
.app{
  display:grid;
  grid-template-columns:320px 1fr;
  grid-template-rows:auto 1fr;
  min-height:100vh;
  max-width:1400px;
  margin:0 auto;
}

/* ── TOP BAR (mobile) ── */
.top-bar{
  display:none;
  grid-column:1/-1;
  background:var(--ink);
  padding:16px 20px;
  align-items:center;
  justify-content:space-between;
}
.top-bar .logo-zh{
  font-family:'Noto Serif KR',serif;
  font-size:18px;
  letter-spacing:6px;
  color:var(--gold-light);
}
.hamburger{
  background:none;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;
  padding:6px 10px;
  cursor:pointer;
  color:#e8e4d8;
  font-size:16px;
  transition:background .2s;
}
.hamburger:hover{background:rgba(255,255,255,0.1);}

/* ── LEFT PANEL ── */
.panel-left{
  background:var(--ink);
  color:#e8e4d8;
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.15) transparent;
}
.panel-left::-webkit-scrollbar{width:4px;}
.panel-left::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}

.panel-header{
  padding:28px 22px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(180deg,rgba(184,154,14,0.08) 0%,transparent 100%);
}
.logo-zh{
  font-family:'Noto Serif KR',serif;
  font-size:24px;
  letter-spacing:10px;
  color:var(--gold-light);
  display:block;
  margin-bottom:4px;
}
.logo-kr{
  font-size:10px;
  letter-spacing:3px;
  color:#8886a0;
  text-transform:uppercase;
  display:block;
  margin-bottom:10px;
}
.logo-sub{
  font-size:12px;
  color:#6e6c88;
  line-height:1.7;
}

.section{
  padding:18px 22px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.section-title{
  font-size:10px;
  letter-spacing:2px;
  color:#6e6c88;
  margin-bottom:12px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:6px;
}
.section-title::before{
  content:'';
  display:inline-block;
  width:3px;
  height:10px;
  background:var(--gold);
  border-radius:2px;
}

/* form elements */
.form-label{
  display:block;
  font-size:11px;
  color:#8886a0;
  margin-bottom:6px;
  letter-spacing:.4px;
}
.inp{
  width:100%;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius);
  padding:9px 12px;
  font-size:13px;
  color:#e8e4d8;
  outline:none;
  font-family:'Noto Sans KR',sans-serif;
  transition:border-color .2s,background .2s;
  -webkit-appearance:none;
}
.inp:focus{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);}
.inp::placeholder{color:#4e4c68;}
textarea.inp{resize:vertical;min-height:76px;line-height:1.7;}

/* gender radio */
.radio-row{display:flex;gap:8px;margin-bottom:14px;}
.radio-btn{
  flex:1;
  padding:9px 8px;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:var(--radius);
  text-align:center;
  font-size:13px;
  cursor:pointer;
  color:#8886a0;
  transition:all .2s;
  user-select:none;
}
.radio-btn.active{
  background:var(--gold);
  border-color:var(--gold);
  color:var(--ink);
  font-weight:500;
}
.radio-btn:hover:not(.active){background:rgba(255,255,255,0.06);color:#c8c4d8;}

/* year range */
.year-row{display:flex;gap:8px;align-items:center;}
.year-row .inp{text-align:center;}
.year-sep{font-size:12px;color:#6e6c88;flex-shrink:0;}

/* event grid */
.select-btns{display:flex;gap:6px;margin-bottom:10px;}
.sel-btn{
  font-size:11px;
  padding:4px 10px;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  cursor:pointer;
  color:#8886a0;
  background:transparent;
  transition:all .2s;
  font-family:'Noto Sans KR',sans-serif;
}
.sel-btn:hover{border-color:rgba(255,255,255,0.3);color:#c8c4d8;}

.event-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.evt-item{
  display:flex;
  align-items:center;
  gap:7px;
  padding:6px 7px;
  border-radius:6px;
  cursor:pointer;
  transition:background .15s;
}
.evt-item:hover{background:rgba(255,255,255,0.06);}
.evt-item input[type=checkbox]{
  width:14px;height:14px;
  accent-color:var(--gold-light);
  cursor:pointer;
  flex-shrink:0;
}
.evt-item label{font-size:12px;cursor:pointer;line-height:1.3;color:#b8b4cc;}
.evt-item.danger label{color:#ffaaaa;}
.evt-item.warn label{color:#ffd090;}
.evt-item.good label{color:#96ddaa;}
.evt-item.neutral label{color:#b8b4cc;}

/* depth */
.depth-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.depth-btn{
  padding:9px 6px;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius);
  font-size:11px;
  text-align:center;
  cursor:pointer;
  color:#6e6c88;
  transition:all .2s;
  line-height:1.4;
  font-family:'Noto Sans KR',sans-serif;
  background:transparent;
}
.depth-btn .d-name{display:block;font-size:12px;margin-bottom:2px;}
.depth-btn .d-sub{display:block;font-size:10px;color:#4e4c68;}
.depth-btn:hover:not(.active){background:rgba(255,255,255,0.06);}
.depth-btn.active{
  border-color:var(--gold);
  color:var(--gold-light);
  background:rgba(184,154,14,0.08);
}
.depth-btn.active .d-sub{color:rgba(232,200,64,0.6);}

/* gen button */
.gen-btn{
  margin:18px 22px 22px;
  padding:13px;
  background:linear-gradient(135deg,#b89a0e,#d4b820);
  border:none;
  border-radius:var(--radius);
  font-family:'Noto Serif KR',serif;
  font-size:14px;
  font-weight:500;
  color:var(--ink);
  cursor:pointer;
  letter-spacing:2px;
  transition:opacity .2s,transform .1s;
  box-shadow:0 4px 16px rgba(184,154,14,0.3);
}
.gen-btn:hover{opacity:.92;}
.gen-btn:active{transform:scale(0.98);}

/* ── RIGHT PANEL ── */
.panel-right{
  display:flex;
  flex-direction:column;
  background:var(--surface);
  min-height:100vh;
}

.right-header{
  padding:22px 28px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  background:var(--surface);
  position:sticky;
  top:0;
  z-index:10;
}
.right-header h1{
  font-family:'Noto Serif KR',serif;
  font-size:17px;
  color:var(--ink);
  font-weight:500;
  letter-spacing:.5px;
}
.status-badge{
  font-size:11px;
  background:var(--jade-bg);
  color:var(--jade);
  border:1px solid var(--jade-border);
  padding:4px 12px;
  border-radius:20px;
  white-space:nowrap;
}

/* tabs */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--border);
  padding:0 28px;
  background:var(--surface);
  overflow-x:auto;
  scrollbar-width:none;
}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{
  padding:11px 18px;
  font-size:12px;
  color:var(--ink3);
  cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:all .2s;
  letter-spacing:.4px;
  white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;
  background:none;
  border-top:none;
  border-left:none;
  border-right:none;
}
.tab:hover:not(.active){color:var(--ink2);}
.tab.active{color:var(--jade);border-bottom-color:var(--jade);font-weight:500;}

/* output */
.output-area{
  flex:1;
  padding:24px 28px;
  overflow-y:auto;
}

.placeholder{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:320px;
  color:var(--ink3);
}
.placeholder-icon{
  font-family:'Noto Serif KR',serif;
  font-size:52px;
  color:var(--border2);
  margin-bottom:16px;
  letter-spacing:0;
}
.placeholder p{font-size:14px;line-height:1.8;text-align:center;color:var(--ink3);}

/* tip box */
.tip-box{
  background:var(--gold-pale);
  border:1px solid var(--gold-border);
  border-radius:var(--radius);
  padding:12px 16px;
  margin-bottom:16px;
  display:flex;
  gap:10px;
  align-items:flex-start;
}
.tip-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.tip-box p{font-size:12px;color:#6a5200;line-height:1.7;}
.tip-box strong{color:#4a3800;}

/* prompt box */
.prompt-box{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px 20px;
  margin-bottom:14px;
  position:relative;
}
.prompt-box-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.prompt-box-title{
  font-size:10px;
  letter-spacing:2px;
  color:var(--ink3);
  text-transform:uppercase;
}
.copy-btn{
  padding:5px 12px;
  font-size:11px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:20px;
  cursor:pointer;
  color:var(--ink2);
  transition:all .2s;
  font-family:'Noto Sans KR',sans-serif;
  white-space:nowrap;
}
.copy-btn:hover{background:var(--jade-bg);border-color:var(--jade-border);color:var(--jade);}
.copy-btn.copied{background:var(--jade-bg);border-color:var(--jade-border);color:var(--jade);}

.prompt-text{
  font-size:12.5px;
  color:var(--ink);
  line-height:1.9;
  white-space:pre-wrap;
  font-family:'Noto Sans KR',sans-serif;
  word-break:break-word;
}

/* guide text */
.guide-block{margin-bottom:20px;}
.guide-block h3{
  font-size:12px;
  font-weight:500;
  color:var(--jade);
  margin-bottom:8px;
  padding-bottom:6px;
  border-bottom:1px solid var(--jade-border);
  letter-spacing:.5px;
}
.guide-text{
  font-size:13px;
  color:var(--ink2);
  line-height:1.9;
  white-space:pre-wrap;
}
.guide-text strong{color:var(--ink);font-weight:500;}

/* timeline */
.timeline{display:flex;flex-direction:column;gap:8px;}
.tl-item{
  display:flex;
  gap:14px;
  align-items:flex-start;
  padding:12px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  transition:border-color .2s;
}
.tl-item.current{border-color:var(--jade-light);border-width:1.5px;background:var(--jade-bg);}
.tl-age{
  font-size:12px;
  font-weight:500;
  color:var(--jade);
  min-width:58px;
  padding-top:2px;
  flex-shrink:0;
}
.tl-item.current .tl-age{color:var(--jade-light);}
.tl-tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.tl-tag{
  display:inline-block;
  font-size:10px;
  padding:2px 7px;
  border-radius:10px;
}
.tl-tag.danger{background:var(--danger-bg);color:var(--danger);}
.tl-tag.warn{background:var(--warn-bg);color:var(--warn-text);}
.tl-tag.good{background:var(--jade-bg);color:var(--jade);}
.tl-tag.neutral{background:var(--surface2);color:var(--ink3);}
.tl-note{font-size:11px;color:var(--ink3);margin-top:4px;width:100%;}

/* copy all bar */
.copy-all-bar{
  padding:14px 28px;
  border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}
.copy-all-btn{
  padding:11px 22px;
  background:var(--jade);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px;
  cursor:pointer;
  font-weight:500;
  transition:opacity .2s,transform .1s;
  white-space:nowrap;
}
.copy-all-btn:hover{opacity:.9;}
.copy-all-btn:active{transform:scale(0.98);}
.copy-note{font-size:12px;color:var(--ink3);line-height:1.5;}

/* ── MOBILE OVERLAY ── */
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:90;
}
.overlay.open{display:block;}

/* ── RESPONSIVE ── */
@media (max-width:900px){
  .app{
    grid-template-columns:1fr;
    grid-template-rows:auto auto 1fr;
  }
  .top-bar{display:flex;}

  .panel-left{
    position:fixed;
    top:0;left:0;bottom:0;
    width:300px;
    z-index:100;
    transform:translateX(-100%);
    transition:transform .3s ease;
    height:100%;
  }
  .panel-left.open{transform:translateX(0);}

  .panel-right{
    grid-column:1;
    min-height:calc(100vh - 56px);
  }
  .right-header{padding:16px 18px 14px;}
  .right-header h1{font-size:15px;}
  .tab-bar{padding:0 14px;}
  .output-area{padding:16px 18px;}
  .copy-all-bar{padding:12px 18px;}
}

@media (max-width:480px){
  .panel-left{width:280px;}
  .event-grid{grid-template-columns:1fr 1fr;}
  .depth-grid{grid-template-columns:1fr 1fr;}
  .right-header{flex-direction:column;align-items:flex-start;gap:6px;}
  .status-badge{align-self:flex-end;}
  .copy-all-bar{flex-direction:column;align-items:flex-start;}
  .copy-all-btn{width:100%;}
}

/* close btn for mobile drawer */
.drawer-close{
  display:none;
  position:absolute;
  top:16px;right:16px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;
  padding:5px 10px;
  color:#e8e4d8;
  font-size:16px;
  cursor:pointer;
}
@media (max-width:900px){
  .drawer-close{display:block;}
  .panel-header{position:relative;padding-right:50px;}
}

/* scrollbar for output */
.output-area::-webkit-scrollbar{width:5px;}
.output-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="app">

  <!-- TOP BAR (mobile only) -->
  <div class="top-bar">
    <span class="logo-zh">紫微斗數</span>
    <button class="hamburger" onclick="openDrawer()">☰ 설정</button>
  </div>

  <!-- LEFT PANEL -->
  <div class="panel-left" id="panel-left">
    <button class="drawer-close" onclick="closeDrawer()">✕</button>

    <div class="panel-header">
      <span class="logo-zh">紫微斗數</span>
      <span class="logo-kr">사건사고 프롬프트 생성기</span>
      <p class="logo-sub">나이대별 사건·사고를 자미두수 별자리 방식으로 분석하는 전문 프롬프트를 생성합니다</p>
    </div>

    <!-- 기본 정보 -->
    <div class="section">
      <div class="section-title">기본 정보</div>

      <label class="form-label">성별</label>
      <div class="radio-row">
        <div class="radio-btn active" id="rb-male" onclick="setGender('남성')">남성</div>
        <div class="radio-btn" id="rb-female" onclick="setGender('여성')">여성</div>
      </div>

      <label class="form-label">양력 / 음력 구분</label>
      <div class="radio-row" style="margin-bottom:14px;">
        <div class="radio-btn active" id="rb-solar" onclick="setCalendar('양력')">양력</div>
        <div class="radio-btn" id="rb-lunar" onclick="setCalendar('음력')">음력</div>
        <div class="radio-btn" id="rb-lunar-leap" onclick="setCalendar('음력윤달')">음력 윤달</div>
      </div>

      <label class="form-label">생년월일</label>
      <div style="display:flex;gap:6px;margin-bottom:12px;">
        <input class="inp" type="number" id="birth-year"  placeholder="년 (예:1997)" inputmode="numeric" style="flex:3;" oninput="updateAgeDisplay()">
        <input class="inp" type="number" id="birth-month" placeholder="월" inputmode="numeric" style="flex:1;text-align:center;" min="1" max="12" oninput="updateAgeDisplay()">
        <input class="inp" type="number" id="birth-day"   placeholder="일" inputmode="numeric" style="flex:1;text-align:center;" min="1" max="31" oninput="updateAgeDisplay()">
      </div>

      <label class="form-label">출생 시각</label>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;">
        <input class="inp" type="number" id="birth-hour"   placeholder="시" inputmode="numeric" style="flex:1;text-align:center;" min="0" max="23">
        <span style="color:#6e6c88;font-size:13px;">:</span>
        <input class="inp" type="number" id="birth-minute" placeholder="분" inputmode="numeric" style="flex:1;text-align:center;" min="0" max="59">
        <span style="color:#6e6c88;font-size:11px;flex-shrink:0;">(24시 기준)</span>
      </div>

      <label class="form-label">현재 나이 <span style="color:#6e6c88;font-size:10px;">(만 나이 자동 계산)</span></label>
      <div id="age-display" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:9px 12px;font-size:13px;color:#8886a0;">
        생년월일을 입력하면 자동 계산됩니다
      </div>
    </div>

    <!-- 분석 범위 -->
    <div class="section">
      <div class="section-title">분석 나이 범위</div>
      <div class="year-row">
        <input class="inp" type="number" id="yr-from" placeholder="시작" style="text-align:center;" inputmode="numeric">
        <span class="year-sep">~</span>
        <input class="inp" type="number" id="yr-to" placeholder="종료" style="text-align:center;" inputmode="numeric">
        <span class="year-sep" style="white-space:nowrap;">세</span>
      </div>
    </div>

    <!-- 사건사고 유형 -->
    <div class="section">
      <div class="section-title">분석할 사건사고</div>
      <div class="select-btns">
        <button class="sel-btn" onclick="selectAll(true)">전체 선택</button>
        <button class="sel-btn" onclick="selectAll(false)">전체 해제</button>
      </div>
      <div class="event-grid" id="event-grid"></div>
    </div>

    <!-- 분석 깊이 -->
    <div class="section">
      <div class="section-title">분석 깊이</div>
      <div class="depth-grid" id="depth-grid"></div>
    </div>

    <!-- 특별 관심사 -->
    <div class="section">
      <div class="section-title">특별 관심사 (선택)</div>

// ── AGE AUTO CALC ──
function calcAge() {
  const y = parseInt(document.getElementById('birth-year').value);
  const m = parseInt(document.getElementById('birth-month').value);
  const d = parseInt(document.getElementById('birth-day').value);
  if (!y || !m || !d) return null;
  const today = new Date();
  let age = today.getFullYear() - y;
  const monthDiff = today.getMonth() + 1 - m;
  if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < d)) age--;
  return age >= 0 ? age : null;
}

function updateAgeDisplay() {
  const age = calcAge();
  const el = document.getElementById('age-display');
  if (age !== null) {
    el.style.color = '#e8c840';
    el.innerHTML = '만 <strong>' + age + '</strong>세 <span style="color:#6e6c88;font-size:11px;">(자동 계산)</span>';
  } else {
    el.style.color = '#8886a0';
    el.innerHTML = '생년월일을 입력하면 자동 계산됩니다';
  }
}

}

}

// ── GENERATE ──
function generate() {
  const age         = calcAge(); // 만 나이 자동 계산
  const yrFrom      = document.getElementById('yr-from').value.trim();

  const birthHour   = document.getElementById('birth-hour').value.trim();
  const birthMinute = document.getElementById('birth-minute').value.trim();


  if (events.length === 0) {
    alert('분석할 사건사고를 하나 이상 선택해주세요.');

  // 시간 표기

  if (birthHour !== '') {
    const h = parseInt(birthHour);
    const idx = Math.floor(((h + 1) % 24) / 2);
    sikchinStr = ` (${SIKCHIN[idx]}시)`;
  }

  const calLabel = calendar === '음력윤달' ? '음력(윤달)' : calendar;

  const birthBlock =
`- 생년월일: ${calLabel} ${birthYear}년 ${birthMonth}월 ${birthDay}일
- 출생 시각: ${timeStr}${sikchinStr}
- 성별: ${gender}`;

  const ageRange = (yrFrom && yrTo)
    ? `${yrFrom}세 ~ ${yrTo}세`
    : (age ? `현재 ${age}세 기준 전 생애` : '전 생애');

  generatedPrompt = `【 자미두수 사건사고 나이대별 분석 요청 】

당신은 자미두수(紫微斗數) 전문 명리 분석가입니다.
아래의 생년월일시 정보를 바탕으로 자미두수 명반을 산출한 뒤, 반드시 아래의 2단계 절차를 순서대로 진행해 주십시오.
※ 사주팔자 교차 분석은 포함하지 않습니다. 자미두수 별자리(성계) 해석에만 집중해 주세요.

【 명반 산출 기본 정보 】
${birthBlock}
- 현재 나이(만): ${age !== null ? age+'세' : '미입력'}
- 분석 대상 기간: ${ageRange}${specialLine}

【 명반 산출 시 유의사항 】
- 위 생년월일은 ${calLabel} 기준입니다. 반드시 ${calLabel}을 기준으로 명반을 산출하세요.
- 출생 시각(${timeStr}${sikchinStr})을 기준으로 시(時) 궁위를 정확히 배정하세요.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
【 1단계: 명반 산출 결과 먼저 출력 (분석 전 필수 확인) 】
━━━━━━━━━━━━━━━━━━━━━━━━━━━━

분석을 시작하기 전에, 산출된 명반을 아래 형식으로 먼저 출력해 주세요.
사용자가 명반이 정확한지 확인한 후 분석을 진행합니다.

● 오행국(五行局): ○○局
● 명궁(命宮): ○宮 / 주성: ○○

아래 형식으로 나이대별(대한 단위, 통상 10년)로 정리해 주세요:

   ○ [사건 유형] — 관련 궁위 및 성계 / 발생 가능성 / 예상 유년 / 세부 해석

※ 단정적 예언보다는 경향성과 확률적 해석으로 표현해 주세요.`;

  document.getElementById('status-badge').textContent =

더욱 깊고 정밀한 분석을 얻을 수 있습니다.

<strong>팁</strong> — 사건 유형별로 나눠서 질문하면
각 영역별(건강, 재물, 관계 등) 집중 분석이 가능합니다.</div>
      </div>
      <div class="guide-block">
        <h3>자미두수 대한(大限) 기준 안내</h3>
        <div class="guide-text">자미두수는 12개 궁위(宮位)를 기반으로 약 10년 단위 대한으로 운세를 분석합니다.

• 명궁(命宮) — 태어난 궁, 본성과 천부적 기운
• 대한(大限) — 10년 주기 운세 흐름
• 유년(流年) — 매년 운세
• 유월(流月) — 매달 운세

주요 분석 성계:
• 주성(主星) — 자미·천기·태양·무곡·천동·염정·천부·태음·탐랑·거문·천상·천량·칠살·파군
• 보성(輔星) — 좌보·우필·천괴·천월·문창·문곡
• 살성(殺星) — 경양·타라·화성·영성·지공·지겁
• 사화(四化) — 화록·화권·화과·화기

사건사고 분석은 대한 + 유년이 교차하는 시점에서
가장 정밀하게 드러납니다.</div>
      </div>`;

  } else if (currentTab === 'preview') {
    const age    = parseInt(document.getElementById('cur-age').value) || 40;
    const yrFrom = parseInt(document.getElementById('yr-from').value) || 10;
    const yrTo   = parseInt(document.getElementById('yr-to').value)   || 70;
    const events = getCheckedEvents();

    const dangerSet  = new Set(['이혼/별거','사업 실패','재물 손실','교통사고','낙상/외상','사망/중병','구속/관재','투자 손실','가족 변고']);
    const warnSet    = new Set(['이직/해고','건강 이상','연애/이별']);
    const goodSet    = new Set(['결혼','취업','사업 도전','출산/임신']);
    const neutralSet = new Set(['이사/이민','학업/시험']);

    const dangerEvts  = events.filter(e => dangerSet.has(e));
    const warnEvts    = events.filter(e => warnSet.has(e));
    const goodEvts    = events.filter(e => goodSet.has(e));
    const neutralEvts = events.filter(e => neutralSet.has(e));

    const ranges = [];
    const startDecade = Math.floor(yrFrom / 10) * 10;
    for (let s = startDecade; s < yrTo; s += 10) {
      const start = Math.max(s, yrFrom);
      const end   = Math.min(s + 9, yrTo - 1);
      if (start > yrTo - 1) break;
      ranges.push({ start, end, isCurrent: age >= start && age <= end });
    }

    const tags = (arr, cat, max=3) =>
      arr.slice(0, max).map(e => `<span class="tl-tag ${cat}">${e}</span>`).join('');

    area.innerHTML = `
      <div class="tip-box">
        <span class="tip-icon">📌</span>
        <p>선택하신 나이 범위의 분석 프레임 미리보기입니다.<br>
        실제 별자리 분석은 생성된 프롬프트를 Claude에 전달하면 이루어집니다.</p>
      </div>
      <div class="timeline">
        ${ranges.map(r => `
          <div class="tl-item${r.isCurrent?' current':''}">
            <div class="tl-age">${r.start}~${r.end}세${r.isCurrent?' ◀':''}</div>
            <div style="flex:1;">
              <div class="tl-tags">
                ${tags(dangerEvts,'danger')}
                ${tags(warnEvts,'warn',2)}
                ${tags(goodEvts,'good',2)}
                ${tags(neutralEvts,'neutral',1)}
              </div>
              <div class="tl-note">→ 자미두수 대한 별자리 분석 + 유년 시점 도출 예정</div>
            </div>
          </div>`).join('')}
      </div>`;
  }
}

// ── COPY ──
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyPrompt(btn) {
  navigator.clipboard.writeText(generatedPrompt).then(() => {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2200);
  }).catch(() => fallbackCopy(generatedPrompt, btn));
}

function copyAll() {
  const btn = document.querySelector('.copy-all-btn');
  navigator.clipboard.writeText(generatedPrompt).then(() => {
    btn.textContent = '✓ 복사 완료!';
    setTimeout(() => { btn.textContent = '전체 복사 → Claude에 붙여넣기'; }, 2200);
  }).catch(() => fallbackCopy(generatedPrompt, btn));
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    setTimeout(() => { btn.textContent = orig; }, 2200);
  }
}
</script>
