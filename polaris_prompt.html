<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자미두수 紫微斗數 프롬프트 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0b07;
  --surface: #171009;
  --surface2: #1f1508;
  --gold: #c9952a;
  --gold2: #e6b84a;
  --gold-dim: rgba(201,149,42,0.15);
  --gold-border: rgba(201,149,42,0.25);
  --red: #9b2a2a;
  --green: #1e6b4a;
  --text: #e8d9be;
  --text-dim: #9a8470;
  --text-faint: #5a4f42;
  --white: #f5ede0;
  --radius: 3px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  line-height: 1.6;
}

/* ── 배경 장식 ── */
.bg-ornament {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-ornament::before {
  content: '紫微斗數';
  position: absolute;
  bottom: -40px;
  right: -20px;
  font-family: 'Noto Serif KR', serif;
  font-size: 260px;
  font-weight: 700;
  color: rgba(201,149,42,0.025);
  letter-spacing: -0.05em;
  line-height: 1;
  white-space: nowrap;
}
.bg-ornament::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}

/* ── 레이아웃 ── */
.wrap {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: 100vh;
}

/* ── 사이드바 ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--gold-border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.logo {
  padding: 32px 24px 24px;
  border-bottom: 1px solid var(--gold-border);
}
.logo-zh {
  font-family: 'Noto Serif KR', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-shadow: 0 0 30px rgba(201,149,42,0.3);
}
.logo-kr {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  margin-top: 4px;
}
.logo-desc {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 8px;
  letter-spacing: 0.05em;
  line-height: 1.8;
}

/* 기본정보 입력 */
.info-section {
  padding: 20px 24px;
  border-bottom: 1px solid var(--gold-border);
}
.section-title {
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--text-faint);
  margin-bottom: 14px;
  text-transform: uppercase;
}
.field {
  margin-bottom: 12px;
}
.field label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 5px;
}
.field select,
.field input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field select:focus,
.field input:focus { border-color: var(--gold); }
.field select option { background: #1f1508; }

/* 분석 영역 선택 */
.areas-section {
  padding: 20px 24px;
  flex: 1;
}
.area-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 3px;
  border: 1px solid transparent;
}
.area-item:hover { background: var(--gold-dim); }
.area-item.selected {
  background: var(--gold-dim);
  border-color: var(--gold-border);
}
.area-check {
  width: 16px;
  height: 16px;
  border: 1px solid var(--gold-border);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  font-size: 10px;
}
.area-item.selected .area-check {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--bg);
}
.area-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--text);
  flex: 1;
}
.area-gong {
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 0.05em;
}

.select-all-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
.text-btn {
  font-size: 11px;
  color: var(--text-faint);
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: color 0.15s;
  background: none;
  border: none;
  padding: 0;
}
.text-btn:hover { color: var(--gold); }

/* ── 메인 영역 ── */
.main {
  display: flex;
  flex-direction: column;
  padding: 40px 48px;
  gap: 32px;
}

/* 깊이 설정 */
.depth-bar {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  overflow: hidden;
}
.depth-btn {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  background: none;
  border-right: 1px solid var(--gold-border);
}
.depth-btn:last-child { border-right: none; }
.depth-btn:hover { background: var(--gold-dim); color: var(--text); }
.depth-btn.active { background: var(--gold-dim); color: var(--gold2); }

/* 프롬프트 카드들 */
.prompt-cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.prompt-card {
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}
.prompt-card:hover { border-color: rgba(201,149,42,0.45); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--gold-border);
  background: rgba(201,149,42,0.04);
}
.card-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  color: var(--gold2);
  letter-spacing: 0.1em;
}
.card-tag {
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 0.15em;
  background: rgba(201,149,42,0.08);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--gold-border);
}

.card-body {
  padding: 20px;
}
.prompt-text {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  color: var(--text);
  line-height: 2;
  white-space: pre-wrap;
  letter-spacing: 0.03em;
}

.card-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--gold-border);
  display: flex;
  justify-content: flex-end;
}
.copy-btn {
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  color: var(--bg);
  background: var(--gold);
  border: none;
  border-radius: var(--radius);
  padding: 7px 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.copy-btn:hover { background: var(--gold2); }
.copy-btn.copied { background: var(--green); color: #a0ffd0; }

/* 전체 복사 / 생성 버튼 */
.action-bar {
  display: flex;
  gap: 12px;
  align-items: center;
}
.gen-btn {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  letter-spacing: 0.2em;
  color: var(--bg);
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  border: none;
  border-radius: var(--radius);
  padding: 13px 36px;
  cursor: pointer;
  transition: all 0.2s;
}
.gen-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

.copy-all-btn {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  letter-spacing: 0.15em;
  color: var(--gold);
  background: transparent;
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 13px 24px;
  cursor: pointer;
  transition: all 0.2s;
}
.copy-all-btn:hover { background: var(--gold-dim); border-color: var(--gold); }

.action-hint {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.05em;
  margin-left: auto;
  line-height: 1.8;
}

/* 빈 상태 */
.empty-state {
  text-align: center;
  padding: 80px 40px;
  color: var(--text-faint);
}
.empty-zh {
  font-family: 'Noto Serif KR', serif;
  font-size: 48px;
  opacity: 0.15;
  margin-bottom: 16px;
}
.empty-text {
  font-size: 13px;
  letter-spacing: 0.1em;
  line-height: 2;
}

/* 사용법 안내 */
.guide-box {
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 20px 24px;
}
.guide-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 12px;
}
.guide-steps {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.guide-step {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.step-num {
  width: 20px;
  height: 20px;
  border: 1px solid var(--gold-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--gold);
  flex-shrink: 0;
  margin-top: 2px;
}
.step-text {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.8;
  letter-spacing: 0.03em;
}
.step-text strong { color: var(--text); font-weight: 500; }

/* 반응형 */
@media (max-width: 768px) {
  .wrap { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; }
  .main { padding: 24px 20px; }
}

/* 스크롤바 */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }
</style>
</head>
<body>

<div class="bg-ornament"></div>

<div class="wrap">

  <!-- ── 사이드바 ── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-zh">紫微斗數</div>
      <div class="logo-kr">자미두수 프롬프트 생성기</div>
      <div class="logo-desc">만세력 이미지와 함께<br>Claude 대화창에 붙여넣으세요</div>
    </div>

    <!-- 기본 정보 -->
    <div class="info-section">
      <div class="section-title">기본 정보</div>
      <div class="field">
        <label>성별</label>
        <select id="gender">
          <option value="남성">남성</option>
          <option value="여성">여성</option>
        </select>
      </div>
      <div class="field">
        <label>현재 나이 (선택)</label>
        <input type="number" id="age" placeholder="예: 52" min="1" max="120">
      </div>
      <div class="field">
        <label>특별 관심사 (선택)</label>
        <input type="text" id="concern" placeholder="예: 이직, 사업, 결혼">
      </div>
      <div class="field">
        <label>유년운 조회 연도 <span style="color:var(--gold);font-size:10px;">★</span></label>
        <input type="number" id="targetYear" placeholder="예: 2027" min="1900" max="2100" value="2026">
      </div>
    </div>

    <!-- 분석 영역 -->
    <div class="areas-section">
      <div class="section-title">분석 영역 선택</div>
      <div class="select-all-row">
        <button class="text-btn" onclick="selectAll()">전체 선택</button>
        <button class="text-btn" onclick="clearAll()">전체 해제</button>
      </div>
      <div id="areaList"></div>
    </div>
  </aside>

  <!-- ── 메인 ── -->
  <main class="main">

    <!-- 사용법 -->
    <div class="guide-box">
      <div class="guide-title">📋 사용 방법</div>
      <div class="guide-steps">
        <div class="guide-step">
          <div class="step-num">1</div>
          <div class="step-text">왼쪽에서 <strong>성별·나이</strong>를 입력하고 <strong>분석할 영역</strong>을 선택하세요</div>
        </div>
        <div class="guide-step">
          <div class="step-num">2</div>
          <div class="step-text"><strong>풀이 깊이</strong>와 <strong>프롬프트 생성</strong> 버튼을 클릭하세요</div>
        </div>
        <div class="guide-step">
          <div class="step-num">3</div>
          <div class="step-text">원하는 프롬프트를 <strong>복사</strong>해서 Claude 대화창에 <strong>만세력 이미지와 함께</strong> 붙여넣으세요</div>
        </div>
        <div class="guide-step">
          <div class="step-num">4</div>
          <div class="step-text">영역별로 따로 질문하면 <strong>훨씬 깊고 전문적인</strong> 풀이를 얻을 수 있습니다</div>
        </div>
      </div>
    </div>

    <!-- 깊이 선택 -->
    <div>
      <div style="font-size:11px;letter-spacing:0.3em;color:var(--text-faint);margin-bottom:10px;text-transform:uppercase;">풀이 깊이</div>
      <div class="depth-bar">
        <button class="depth-btn" data-depth="simple" onclick="setDepth(this)">입문<br><span style="font-size:10px;opacity:0.6">핵심만 간략히</span></button>
        <button class="depth-btn active" data-depth="standard" onclick="setDepth(this)">표준<br><span style="font-size:10px;opacity:0.6">균형잡힌 분석</span></button>
        <button class="depth-btn" data-depth="deep" onclick="setDepth(this)">심층<br><span style="font-size:10px;opacity:0.6">별 조합·살성 포함</span></button>
        <button class="depth-btn" data-depth="expert" onclick="setDepth(this)">전문가<br><span style="font-size:10px;opacity:0.6">사주와 교차분석</span></button>
      </div>
    </div>

    <!-- 생성 버튼 -->
    <div class="action-bar">
      <button class="gen-btn" onclick="generatePrompts()">프롬프트 생성</button>
      <button class="copy-all-btn" id="copyAllBtn" onclick="copyAll()" style="display:none">전체 복사</button>
      <div class="action-hint" id="actionHint"></div>
    </div>

    <!-- 결과 카드 -->
    <div class="prompt-cards" id="promptCards">
      <div class="empty-state">
        <div class="empty-zh">命</div>
        <div class="empty-text">분석 영역을 선택하고<br>프롬프트 생성 버튼을 누르세요</div>
      </div>
    </div>

  </main>
</div>

<script>
// ── 데이터 ──────────────────────────────────────────────
const AREAS = [
  { id: 'overview',  name: '전체 명반 개요',   gong: '命盤',  icon: '☯' },
  { id: 'ming',      name: '명궁 · 성격·체질', gong: '命宮',  icon: '★' },
  { id: 'finance',   name: '재백궁 · 재물운',  gong: '財帛宮', icon: '◈' },
  { id: 'career',    name: '관록궁 · 직업운',  gong: '官祿宮', icon: '◆' },
  { id: 'love',      name: '부처궁 · 인연·결혼',gong: '夫妻宮', icon: '❤' },
  { id: 'children',  name: '자녀궁 · 자녀운',  gong: '子女宮', icon: '◉' },
  { id: 'siblings',  name: '형제궁 · 인맥운',  gong: '兄弟宮', icon: '◎' },
  { id: 'property',  name: '전택궁 · 부동산운', gong: '田宅宮', icon: '▣' },
  { id: 'travel',    name: '천이궁 · 이동·해외',gong: '遷移宮', icon: '✈' },
  { id: 'servant',   name: '노복궁 · 협력자운', gong: '奴僕宮', icon: '◇' },
  { id: 'health',    name: '질액궁 · 건강운',  gong: '疾厄宮', icon: '✚' },
  { id: 'virtue',    name: '복덕궁 · 정신·행복',gong: '福德宮', icon: '☀' },
  { id: 'parent',    name: '부모궁 · 윗사람운', gong: '父母宮', icon: '◑' },
  { id: 'dayun',     name: '대운 흐름 · 10년주기',gong: '大運', icon: '∞' },
  { id: 'yearcustom', name: '특정 연도 유년운',  gong: '流年',  icon: '◐' },
];

const DEPTH_LABELS = {
  simple:   '입문',
  standard: '표준',
  deep:     '심층',
  expert:   '전문가',
};

let selectedAreas = new Set(['overview', 'ming', 'finance', 'career', 'dayun']);
let currentDepth = 'standard';

// ── 영역 목록 렌더 ──────────────────────────────────────
function renderAreaList() {
  const el = document.getElementById('areaList');
  el.innerHTML = AREAS.map(a => `
    <div class="area-item ${selectedAreas.has(a.id) ? 'selected' : ''}"
         onclick="toggleArea('${a.id}', this)">
      <div class="area-check">${selectedAreas.has(a.id) ? '✓' : ''}</div>
      <div class="area-name">${a.name}</div>
      <div class="area-gong">${a.gong}</div>
    </div>
  `).join('');
}

function toggleArea(id, el) {
  if (selectedAreas.has(id)) {
    selectedAreas.delete(id);
    el.classList.remove('selected');
    el.querySelector('.area-check').textContent = '';
  } else {
    selectedAreas.add(id);
    el.classList.add('selected');
    el.querySelector('.area-check').textContent = '✓';
  }
}

function selectAll() { AREAS.forEach(a => selectedAreas.add(a.id)); renderAreaList(); }
function clearAll()  { selectedAreas.clear(); renderAreaList(); }

function setDepth(btn) {
  document.querySelectorAll('.depth-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentDepth = btn.dataset.depth;
}

// ── 프롬프트 생성기 ────────────────────────────────────
function buildPrompt(areaId, gender, age, concern, depth, targetYear) {
  targetYear = targetYear || 2026;
  const g = gender || '남성';
  const ageStr = age ? `현재 나이: ${age}세` : '';
  const concernStr = concern ? `특별 관심사: ${concern}` : '';

  const depthInstructions = {
    simple: '핵심만 간결하게 3~5문장으로 풀이해주세요.',
    standard: '주요 내용을 균형있게 풀이하되, 실생활에 도움이 되는 조언을 포함해주세요.',
    deep: '14주성, 보조성, 살성의 조합까지 상세히 분석하고, 화록·화권·화과·화기의 영향도 설명해주세요.',
    expert: '자미두수 명반과 사주팔자를 교차 분석하고, 대운·세운까지 연동하여 전문가 수준으로 풀이해주세요.',
  };

  const baseHeader = `첨부한 만세력 이미지에서 사주팔자를 먼저 정확히 읽어주세요.
성별: ${g}${ageStr ? '\n' + ageStr : ''}${concernStr ? '\n' + concernStr : ''}

function buildYearPrompt(baseHeader, year, concern) {
  // 간단한 육십갑자 계산
  const stems  = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const branches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const stemNames  = ['갑','을','병','정','무','기','경','신','임','계'];
  const branchNames= ['자','축','인','묘','진','사','오','미','신','유','술','해'];
  const si = ((year - 4) % 10 + 10) % 10;
  const bi = ((year - 4) % 12 + 12) % 12;
  const ganzhi = `${stems[si]}${branches[bi]}(${stemNames[si]}${branchNames[bi]})`;

  return `${baseHeader}

【 ${year}년 유년운 분석 · ${ganzhi}년 流年 】

1. ${year}년 유년 기본 세팅
   - ${year}년 천간·지지: ${ganzhi}
   - 유년 명궁 위치 산출
   - 본 명반과의 충·합·형·해 관계 분석

2. ${year}년 전반적 운세
   - ${ganzhi}년이 이 명반에 미치는 전반적 영향
   - 길한 달과 주의해야 할 달 (상반기 / 하반기)

3. 분야별 ${year}년 운세
   - 재물: 수입·지출 흐름, 투자 가부
   - 직업: 변화 가능성, 승진·이직·창업 여부
   - 인간관계: 새로운 만남, 이별 가능성
   - 건강: 주의해야 할 시기와 부위

4. ${year}년 최대 기회와 위험
   - 놓치면 안 되는 시기와 분야
   - 반드시 조심해야 할 시기와 상황

5. ${year}년 행동 전략
   - 구체적 실천 조언${concern ? `\n   - ${concern} 관련 ${year}년 흐름` : ''}`;
}

// 전역 프롬프트 저장소 (dataset 손상 방지)
let generatedPrompts = [];

// ── 프롬프트 생성 ──────────────────────────────────────
function generatePrompts() {
  if (selectedAreas.size === 0) {
    alert('분석 영역을 하나 이상 선택해주세요.');
    return;
  }

  const gender     = document.getElementById('gender').value;
  const age        = document.getElementById('age').value;
  const concern    = document.getElementById('concern').value.trim();
  const targetYear = parseInt(document.getElementById('targetYear').value) || 2026;
  const cards      = document.getElementById('promptCards');

  generatedPrompts = [];
  cards.innerHTML = '';

  const orderedAreas = AREAS.filter(a => selectedAreas.has(a.id));

  orderedAreas.forEach((area, idx) => {
    const promptText = buildPrompt(area.id, gender, age, concern, currentDepth, targetYear);
    generatedPrompts.push(promptText);

    const card = document.createElement('div');
    card.className = 'prompt-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${area.icon} ${area.name}${area.id === 'yearcustom' ? ' <span style="color:var(--gold);font-size:12px;">(${targetYear}년)</span>' : ''}</div>
        <div class="card-tag">${area.gong} · ${DEPTH_LABELS[currentDepth]}</div>
      </div>
      <div class="card-body">
        <div class="prompt-text">${escHtml(promptText)}</div>
      </div>
      <div class="card-footer">
        <button class="copy-btn" data-idx="${idx}" onclick="copyPrompt(this)">복사</button>
      </div>
    `;
    cards.appendChild(card);
  });

  document.getElementById('copyAllBtn').style.display = 'block';
  document.getElementById('actionHint').innerHTML =
    `프롬프트 ${orderedAreas.length}개 생성됨<br>각 항목을 개별적으로 Claude에 질문하세요`;
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function copyPrompt(btn) {
  const idx = parseInt(btn.dataset.idx);
  const text = generatedPrompts[idx] || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '복사';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  if (generatedPrompts.length === 0) return;
  const sep = '\n\n' + '━'.repeat(40) + '\n\n';
  const all = generatedPrompts.join(sep);
  const btn = document.getElementById('copyAllBtn');

  navigator.clipboard.writeText(all).then(() => {
    btn.textContent = '✓ 전체 복사됨';
    setTimeout(() => btn.textContent = '전체 복사', 2500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = all;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ 전체 복사됨';
    setTimeout(() => btn.textContent = '전체 복사', 2500);
  });
}
