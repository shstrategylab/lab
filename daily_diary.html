<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 하루 돌아보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Serif KR', Georgia, serif;
    background: linear-gradient(170deg, #FDF8F2 0%, #F5EDE0 100%);
    min-height: 100vh;
    padding-bottom: 120px;
  }
  ::-webkit-scrollbar { display: none; }

  /* ── 헤더 ── */
  #header {
    background: linear-gradient(135deg, #6B4F35 0%, #9A7050 100%);
    padding: 28px 20px 0;
    text-align: center;
    position: sticky; top: 0; z-index: 20;
    box-shadow: 0 4px 20px rgba(107,79,53,0.25);
  }
  .date-label { color: rgba(255,255,255,0.85); font-size: 12px; letter-spacing: 2px; margin-bottom: 4px; }
  .header-title { color: #fff; font-size: 20px; font-weight: 700; }
  .header-sub { color: rgba(255,255,255,0.82); font-size: 12px; margin-top: 3px; font-style: italic; }

  /* 탭 바 */
  .tab-bar {
    display: flex; margin-top: 16px;
    overflow-x: auto; gap: 2px;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1; min-width: 72px;
    padding: 10px 4px 12px;
    border: none; background: transparent;
    color: rgba(255,255,255,0.75);
    font-size: 12px; font-family: inherit;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    border-radius: 12px 12px 0 0;
    position: relative;
  }
  .tab-btn .tab-emoji { font-size: 18px; }
  .tab-btn .tab-badge {
    position: absolute; top: 6px; right: 8px;
    background: #FFD580; color: #6B4F35;
    font-size: 10px; font-weight: 700;
    border-radius: 8px; padding: 1px 5px;
    display: none;
  }
  .tab-btn.active {
    background: #FDF8F2;
    color: var(--tab-color, #6B4F35);
    font-weight: 700;
  }
  .tab-btn.active .tab-badge,
  .tab-btn.has-answer .tab-badge { display: block; }

  /* ── 본문 ── */
  #body-wrap { padding: 16px 16px 0; }

  /* 탭 헤더 카드 */
  .tab-header-card {
    border-radius: 16px; padding: 16px 18px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .th-emoji { font-size: 26px; }
  .th-title { font-size: 18px; font-weight: 700; }
  .th-sub { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .th-progress { margin-left: auto; text-align: right; }
  .th-pct { font-size: 20px; font-weight: 700; }
  .th-cnt { font-size: 12px; opacity: 0.8; }

  /* 진행 바 */
  .tab-prog-bar {
    height: 5px; border-radius: 10px; margin-bottom: 14px;
    background: #EDE8E0; overflow: hidden;
  }
  .tab-prog-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }

  /* 아이템 카드 */
  .item-card {
    border-radius: 16px; background: #fff;
    border: 1.5px solid #EDE8E0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    overflow: hidden; margin-bottom: 10px;
    transition: all 0.25s ease;
  }
  .item-card.is-next {
    border: 2px solid var(--cat-color);
    box-shadow: 0 4px 18px rgba(0,0,0,0.10);
  }
  .item-body { padding: 16px 16px 12px; }
  .item-q { font-size: 16px; color: #2A2018; line-height: 1.65; font-weight: 600; transition: color 0.2s; }
  .item-hint { font-size: 13px; color: #8A7F72; margin-top: 6px; font-style: italic; }

  /* 선택 상태 */
  .item-card.ans-yes .item-q  { color: var(--cat-color); font-weight: 700; }
  .item-card.ans-yes .item-hint { color: var(--cat-color); opacity: 0.8; }
  .item-card.ans-no  .item-q  { color: #7A7068; }
  .item-card.ans-na  .item-q  { color: #9A9088; }

  /* 3버튼 */
  .item-btns { display: flex; border-top: 1px solid #EDE8E0; }
  .ans-btn {
    flex: 1; padding: 13px 4px;
    border: none; background: transparent;
    font-size: 13px; font-family: inherit;
    cursor: pointer; transition: all 0.2s;
    color: #7A7068; line-height: 1.4; text-align: center; font-weight: 500;
  }
  .ans-btn:not(:last-child) { border-right: 1px solid #EDE8E0; }
  .ans-btn:first-child { border-radius: 0 0 0 16px; }
  .ans-btn:last-child  { border-radius: 0 0 16px 0; }

  /* 결과 카드 */
  .result-card {
    border-radius: 20px; padding: 24px 20px;
    text-align: center; margin-bottom: 14px;
    background: linear-gradient(135deg, #6B4F35, #9A7050);
    box-shadow: 0 8px 32px rgba(107,79,53,0.28);
  }
  .r-emoji { font-size: 38px; }
  .r-pct { color: #FFE9B8; font-size: 28px; font-weight: 700; margin-top: 6px; }
  .r-msg { color: rgba(255,255,255,0.88); font-size: 14px; margin-top: 6px; line-height: 1.6; }
  .r-sub { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 4px; }
  .cat-scores { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 14px; }
  .cat-score-tag {
    background: rgba(255,255,255,0.15); border-radius: 20px;
    padding: 5px 12px; font-size: 12px; color: #fff;
  }

  /* 공유 버튼 */
  .share-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #B09070, #C8A882);
    color: #fff; border: none; border-radius: 16px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer; box-shadow: 0 4px 16px rgba(107,79,53,0.3);
    transition: background 0.3s; margin-bottom: 4px;
  }
  .share-btn.full { background: linear-gradient(135deg, #6B4F35, #9A7050); }

  /* 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #FDF8F2; border-radius: 24px 24px 0 0;
    padding: 28px 20px 48px; width: 100%;
    max-height: 88vh; overflow-y: auto;
  }
  .modal-title { text-align: center; margin-bottom: 22px; }
  .modal-title h2 { font-size: 19px; font-weight: 700; color: #4A3020; }
  .modal-title p { font-size: 13px; color: #AAA; margin-top: 5px; }
  .share-option {
    background: #fff; border: 1.5px solid #D4C4B0; border-radius: 16px;
    padding: 18px; margin-bottom: 10px; cursor: pointer;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .share-option .opt-icon { font-size: 30px; flex-shrink: 0; }
  .share-option h3 { font-weight: 700; font-size: 15px; color: #4A3020; margin-bottom: 3px; }
  .share-option p { font-size: 12px; color: #888; line-height: 1.6; }
  .share-preview-card {
    border-radius: 14px; padding: 18px; margin-bottom: 14px; color: #fff;
  }
  .spc-result { background: linear-gradient(135deg, #6B4F35, #9A7050); }
  .spc-invite { background: linear-gradient(135deg, #3A6050, #5A8070); }
  .text-preview {
    background: #fff; border-radius: 12px; padding: 13px 15px;
    font-size: 12px; color: #666; line-height: 1.8;
    white-space: pre-wrap; border: 1px solid #EDE8E0;
    margin-bottom: 14px; max-height: 170px; overflow-y: auto;
  }
  .btn-copy {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #6B4F35, #9A7050);
    color: #fff; border: none; border-radius: 13px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-bottom: 9px;
  }
  .btn-close {
    width: 100%; padding: 13px;
    background: transparent; color: #AAA;
    border: 1px solid #DDD; border-radius: 13px;
    font-size: 13px; font-family: inherit; cursor: pointer;
  }
  .btn-back {
    background: none; border: none; color: #AAA;
    font-size: 13px; font-family: inherit; cursor: pointer;
    padding: 0 0 12px; display: block;
  }
  #toast {
    display: none; position: fixed; bottom: 88px; left: 50%;
    transform: translateX(-50%);
    background: #3A2A1A; color: #fff;
    padding: 12px 20px; border-radius: 22px;
    font-size: 13px; z-index: 300; white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.22);
  }

  /* 경각심 팝업 */
  #nudge-popup {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 200; padding: 0 16px 32px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .nudge-card {
    background: #2C1F12;
    border-radius: 20px;
    padding: 20px 20px 16px;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.25);
  }
  .nudge-icon { font-size: 28px; margin-bottom: 8px; }
  .nudge-title { color: #FFD580; font-size: 15px; font-weight: 700; line-height: 1.5; margin-bottom: 6px; }
  .nudge-body  { color: rgba(255,255,255,0.82); font-size: 13px; line-height: 1.7; }
  .nudge-close {
    margin-top: 14px; width: 100%; padding: 11px;
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7);
    border: none; border-radius: 12px;
    font-size: 13px; font-family: inherit; cursor: pointer;
  }
</style>
</head>
<body>

<div id="header">
  <div class="date-label" id="date-label"></div>
  <div class="header-title">오늘 하루 돌아보기</div>
  <div class="header-sub">빈손으로 왔다 빈손으로 간다. 그게 인생이다.</div>
  <div class="tab-bar" id="tab-bar"></div>
</div>

<div id="body-wrap"></div>

<div class="modal-overlay" id="share-modal" onclick="closeShare()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="share-step1">
      <div class="modal-title"><h2>공유하기</h2><p>어떤 내용을 공유할까요?</p></div>
      <div class="share-option" onclick="showShareDetail('result')">
        <div class="opt-icon">📊</div>
        <div><h3>내 진단 결과 공유</h3><p>오늘 실천한 것들을 공유해요.<br>친구들이 "나도 해봐야겠다" 싶게 만들어요.</p></div>
      </div>
      <div class="share-option" onclick="showShareDetail('invite')">
        <div class="opt-icon">🌿</div>
        <div><h3>앱 초대하기</h3><p>이 자가진단 앱을 친구에게 소개해요.<br>같이 하루를 돌아보자고 권해봐요.</p></div>
      </div>
      <button class="btn-close" onclick="closeShare()">닫기</button>
    </div>
    <div id="share-step2" style="display:none">
      <button class="btn-back" onclick="backStep()">← 뒤로</button>
      <div id="share-detail-title" style="font-size:16px;font-weight:700;color:#4A3020;margin-bottom:14px"></div>
      <div id="share-preview-card" class="share-preview-card"></div>
      <div id="share-text-preview" class="text-preview"></div>
      <button class="btn-copy" onclick="copyShareText()">📋 텍스트 복사하기</button>
      <button class="btn-close" onclick="closeShare()">닫기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="nudge-popup">
  <div class="nudge-card">
    <div class="nudge-icon" id="nudge-icon"></div>
    <div class="nudge-title" id="nudge-title"></div>
    <div class="nudge-body"  id="nudge-body"></div>
    <button class="nudge-close" onclick="closeNudge()">알겠어요, 내일은 해볼게요 👊</button>
  </div>
</div>

<script>
const allItems = [

  { id:"l6",  cat:"인생철학",  q:"누군가를 미워하는 마음을 내려놓았나요?",                     hint:"원수도 죽으면 흙으로 돌아간다",               yes:"내려놓았다",               no:"아직 미웠다",          na:"해당 없다" },

const cats = ["인생철학","건강식습관","아침루틴","마인드셋"];

const todayKey = "diary3_" + new Date().toISOString().split("T")[0];
let answers = {};
let activeTab = "인생철학";
let shareType = null;

try { const s = localStorage.getItem(todayKey); if(s) answers = JSON.parse(s); } catch{}
function save() { try { localStorage.setItem(todayKey, JSON.stringify(answers)); } catch{} }

function getDateLabel() {
  const d = new Date();
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${"일월화수목금토"[d.getDay()]}요일)`;
}
function getEmoji(pct) { return pct>=80?"🌟":pct>=60?"😊":pct>=40?"🙂":pct>=20?"😐":"💪"; }
function getMsg(pct) {
  if(pct>=80) return "오늘 정말 잘 살았네요. 스스로를 칭찬해주세요!";
  if(pct>=60) return "꽤 잘 하고 있어요. 조금만 더 신경 써봐요.";
  if(pct>=40) return "절반은 실천했네요. 내일은 조금 더 해봐요.";
  if(pct>=20) return "오늘은 쉬어가는 날이었나요. 내일 다시 시작해요.";
  return "지금 이 앱을 쓴 것만으로도 이미 한 걸음 내딛은 거예요 💪";
}

function renderTabs() {
  document.getElementById("date-label").textContent = getDateLabel();
  document.getElementById("tab-bar").innerHTML = cats.map(cat => {
    const cfg = catConfig[cat];
    const items = allItems.filter(i => i.cat === cat);
    const yesCount = items.filter(i => answers[i.id] === "yes").length;
    const hasAny = items.some(i => answers[i.id] !== undefined);
    const isActive = cat === activeTab;
    return `<button class="tab-btn${isActive?" active":""}${hasAny?" has-answer":""}"
      style="--tab-color:${cfg.color}" onclick="switchTab('${cat}')">
      <span class="tab-emoji">${cfg.emoji}</span>
      <span>${cat}</span>
      <span class="tab-badge">${yesCount}</span>
    </button>`;
  }).join("");
}

function renderBody() {
  const cat = activeTab;
  const cfg = catConfig[cat];
  const items = allItems.filter(i => i.cat === cat);
  const yesCount = items.filter(i => answers[i.id] === "yes").length;
  const answeredCount = items.filter(i => answers[i.id] !== undefined).length;
  const pct = items.length > 0 ? Math.round(yesCount / items.length * 100) : 0;

  const totalAnswered = allItems.filter(i => answers[i.id] !== undefined).length;
  const totalYes = allItems.filter(i => answers[i.id] === "yes").length;
  const totalPct = Math.round(totalYes / allItems.length * 100);

  const firstUnanswered = items.find(i => answers[i.id] === undefined);

  const itemsHtml = items.map(item => {
    const ans = answers[item.id];
    let cls = "item-card";
    if(!ans && firstUnanswered?.id === item.id) cls += " is-next";
    if(ans === "yes") cls += " ans-yes";
    if(ans === "no")  cls += " ans-no";
    if(ans === "na")  cls += " ans-na";

    const yesSt = ans==="yes" ? `background:${cfg.color};color:#fff;font-weight:700;` : "";
    const noSt  = ans==="no"  ? `background:#EDEAE5;color:#777;font-weight:600;` : "";
    const naSt  = ans==="na"  ? `background:#F0EDE8;color:#999;font-weight:600;` : "";

    return `<div class="${cls}" style="--cat-color:${cfg.color}" id="card-${item.id}">
      <div class="item-body">
        <div class="item-q">${item.q}</div>
        <div class="item-hint">💬 ${item.hint}</div>
      </div>
      <div class="item-btns">
        <button class="ans-btn" style="${yesSt}" onclick="doAnswer('${item.id}','yes')">${ans==="yes"?"✅ ":""}${item.yes}</button>
        <button class="ans-btn" style="${noSt}"  onclick="doAnswer('${item.id}','no')">${ans==="no"?"😅 ":""}${item.no}</button>
        <button class="ans-btn" style="${naSt}"  onclick="doAnswer('${item.id}','na')">${ans==="na"?"— ":""}${item.na}</button>
      </div>
    </div>`;
  }).join("");

  let resultHtml = "";
  if(totalAnswered === allItems.length) {
    const catTagsHtml = cats.map(c => {
      const ci = allItems.filter(i => i.cat === c);
      const cy = ci.filter(i => answers[i.id] === "yes").length;
      return `<span class="cat-score-tag">${catConfig[c].emoji} ${c} ${cy}/${ci.length}</span>`;
    }).join("");
    resultHtml = `<div class="result-card">
      <div class="r-emoji">${getEmoji(totalPct)}</div>
      <div class="r-pct">${totalPct}%</div>
      <div class="r-msg">${getMsg(totalPct)}</div>
      <div class="r-sub">전체 ${allItems.length}개 중 ${totalYes}개 실천</div>
      <div class="cat-scores">${catTagsHtml}</div>
    </div>`;
  }

  const allDone = totalAnswered === allItems.length;

  document.getElementById("body-wrap").innerHTML = `
    <div class="tab-header-card" style="background:${cfg.bg};color:${cfg.color}">
      <span class="th-emoji">${cfg.emoji}</span>
      <div>
        <div class="th-title">${cat}</div>
        <div class="th-sub">${cfg.desc}</div>
      </div>
      <div class="th-progress">
        <div class="th-pct">${yesCount}<span style="font-size:13px;font-weight:400"> ✅</span></div>
        <div class="th-cnt">${answeredCount}/${items.length} 답변</div>
      </div>
    </div>
    <div class="tab-prog-bar">
      <div class="tab-prog-fill" style="width:${pct}%;background:${cfg.fill}"></div>
    </div>
    ${itemsHtml}
    ${resultHtml}
    <button class="share-btn${allDone?" full":""}" onclick="openShare()">
      ${allDone?"📤 오늘의 진단 공유하기":`📤 지금까지 결과 공유하기 (${totalAnswered}/${allItems.length})`}
    </button>`;
}

function render() { renderTabs(); renderBody(); }

function switchTab(cat) {
  activeTab = cat;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function doAnswer(id, val) {
  answers[id] = val;
  save();
  render();
  // 경각심 메시지
  if(val === "no" || val === "na") {
    const item = allItems.find(i => i.id === id);
    if(item) showNudge(item, val);
  }
  setTimeout(() => {
    const items = allItems.filter(i => i.cat === activeTab);
    const next = items.find(i => answers[i.id] === undefined);
    if(next) {
      const el = document.getElementById("card-" + next.id);
      if(el) el.scrollIntoView({ behavior:"smooth", block:"center" });
    }
  }, 150);
}

const defaultNudge = {
  "인생철학":  { no: { icon:"🌿", title:"삶의 본질을 한 번쯤 생각해보세요", body:"바쁜 일상 속에서 놓치고 있는 것들이 있을 수 있어요.\n죽고 나면 소용없는 것들을 위해 오늘을 다 쓰고 있진 않은지 돌아보세요." }, na: { icon:"💭", title:"생각해본 적 없다면, 지금이 기회예요", body:"인생철학이라고 거창하게 생각하지 마세요.\n'나는 어떻게 살고 싶은가?' — 이 질문 하나면 충분해요." } },
  "건강식습관":{ no: { icon:"🥗", title:"건강은 잃고 나서야 그 소중함을 알아요", body:"사는 날까지는 건강하게 살아야 하지 않을까요?\n오늘 못 한 건 내일 꼭 챙겨보세요. 몸은 거짓말을 안 합니다." }, na: { icon:"🤔", title:"건강에 관심이 없으신가요?", body:"오래 살 생각이 없으신 건 아니겠죠?\n사는 날까지만큼은 건강하게 살아야 하지 않을까요.\n작은 습관 하나가 10년 후를 바꿉니다." } },
  "아침루틴":  { no: { icon:"☀️", title:"아침을 어떻게 시작하느냐가 하루를 결정해요", body:"대충 시작한 아침은 대충 흘러가는 하루가 됩니다.\n내일 아침, 딱 한 가지만 바꿔보세요." }, na: { icon:"😴", title:"준비가 안 된 게 아니라 습관이 없는 거예요", body:"모든 습관은 '처음 한 번'에서 시작됩니다.\n내일 아침, 딱 하나만 — 물 한 잔부터 시작해보세요." } },

};

let nudgeTimer = null;
function showNudge(item, val) {
  const key = `${item.id}_${val}`;
  const msg = nudgeMessages[key] || defaultNudge[item.cat]?.[val];
  if(!msg) return;
  if(Math.random() > 0.6) return; // 60% 확률로만 표시
  document.getElementById("nudge-icon").textContent = msg.icon;
  document.getElementById("nudge-title").textContent = msg.title;
  document.getElementById("nudge-body").textContent = msg.body;
  document.getElementById("nudge-popup").style.display = "block";
  if(nudgeTimer) clearTimeout(nudgeTimer);
  nudgeTimer = setTimeout(closeNudge, 7000);
}
function closeNudge() {
  document.getElementById("nudge-popup").style.display = "none";
  if(nudgeTimer) clearTimeout(nudgeTimer);
}

function openShare() {
  document.getElementById("share-modal").classList.add("open");
  document.getElementById("share-step1").style.display = "block";
  document.getElementById("share-step2").style.display = "none";
}
function closeShare() { document.getElementById("share-modal").classList.remove("open"); shareType = null; }
function backStep() {
  document.getElementById("share-step1").style.display = "block";
  document.getElementById("share-step2").style.display = "none";
}

function showShareDetail(type) {
  shareType = type;
  document.getElementById("share-step1").style.display = "none";
  document.getElementById("share-step2").style.display = "block";
  const totalYes = allItems.filter(i => answers[i.id] === "yes").length;
  const totalPct = Math.round(totalYes / allItems.length * 100);

  if(type === "result") {
    document.getElementById("share-detail-title").textContent = "📊 내 진단 결과";
    const catTagsHtml = cats.map(c => {
      const ci = allItems.filter(i => i.cat === c);
      const cy = ci.filter(i => answers[i.id] === "yes").length;
      const cd = ci.filter(i => answers[i.id] !== undefined).length;
      return `<span style="background:rgba(255,255,255,0.18);border-radius:20px;padding:5px 11px;font-size:12px">${catConfig[c].emoji} ${c} ${cy}/${cd}</span>`;
    }).join("");
    document.getElementById("share-preview-card").className = "share-preview-card spc-result";
    document.getElementById("share-preview-card").innerHTML = `
      <div style="font-size:30px">${getEmoji(totalPct)}</div>
      <div style="font-size:22px;font-weight:700;margin-top:4px">${totalPct}% 실천</div>
      <div style="font-size:12px;opacity:0.75;margin-top:3px">${allItems.length}개 항목 중 ${totalYes}개 · ${getDateLabel()}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">${catTagsHtml}</div>
      <div style="margin-top:12px;font-size:13px;opacity:0.88;font-style:italic;line-height:1.6">"${getMsg(totalPct)}"</div>`;
    document.getElementById("share-text-preview").textContent = genResultText();
  } else {
    document.getElementById("share-detail-title").textContent = "🌿 앱 초대 메시지";
    document.getElementById("share-preview-card").className = "share-preview-card spc-invite";
    document.getElementById("share-preview-card").innerHTML = `
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">오늘 하루 얼마나 잘 살았나요? 🌿</div>
      <div style="font-size:13px;opacity:0.85;line-height:1.8">
        ${allItems.length}가지 질문에 솔직하게 답해보세요.<br>
        했다 / 못 했다 / 해당없다 — 딱 3가지만.<br>
        매일 저녁 2~3분이면 충분해요.
      </div>
      <div style="margin-top:10px;font-size:13px;opacity:0.7">나는 오늘 ${totalPct}% 실천했어요 ${getEmoji(totalPct)}</div>`;
    document.getElementById("share-text-preview").textContent = genInviteText();
  }
}

function genResultText() {
  const totalYes = allItems.filter(i => answers[i.id] === "yes").length;
  const totalPct = Math.round(totalYes / allItems.length * 100);
  const lines = [`${getEmoji(totalPct)} 오늘 하루 나의 자가진단 결과`,`📅 ${getDateLabel()}`,``,
    `전체 ${allItems.length}개 항목 중 ${totalYes}개 실천 ✅`,`실천률 ${totalPct}%`,``];
  cats.forEach(c => {
    const ci = allItems.filter(i => i.cat === c);
    const cy = ci.filter(i => answers[i.id] === "yes").length;
    const cd = ci.filter(i => answers[i.id] !== undefined).length;
    lines.push(`${catConfig[c].emoji} ${c}: ${cy}/${cd} 실천`);
  });
  lines.push(``,`"${getMsg(totalPct)}"`,``,`나도 오늘 하루를 돌아봤어요.`,
    `잠깐 멈추고 스스로를 체크해보는 건 어때요? 🌿`,`#오늘의실천 #하루돌아보기 #자기성찰 #성장일기`);
  return lines.join("\n");
}

function genInviteText() {
  const totalYes = allItems.filter(i => answers[i.id] === "yes").length;
  const totalPct = Math.round(totalYes / allItems.length * 100);
  return [`🌿 오늘 하루 얼마나 잘 살았나요?`,``,
    `죽고 나면 소용없는 것들, 병 부르는 식습관,`,
    `94세 건강 전문가의 아침 루틴, 현실 인생 조언...`,``,
    `${allItems.length}가지 질문에 솔직하게 답해보세요.`,
    `했다 / 못 했다 / 해당없다 — 딱 3가지만.`,`매일 저녁 2~3분이면 충분해요.`,``,
    `나는 오늘 ${totalPct}% 실천했어요 ${getEmoji(totalPct)}`,``,
    `#하루돌아보기 #자기성찰 #오늘도성장`].join("\n");
}

function copyShareText() {
  const text = shareType === "result" ? genResultText() : genInviteText();
  navigator.clipboard?.writeText(text)
    .then(() => showToast("복사됐어요! SNS에 붙여넣기 해보세요 ✨"))
    .catch(() => showToast("텍스트를 직접 선택해서 복사해보세요"));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 3000);
}

render();
</script>
